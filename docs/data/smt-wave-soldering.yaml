tutorial:
  process_name: SMT印制板波峰焊工艺
  total_steps: 7
  estimated_time: 约 30-60 分钟/板
steps:
  - step_no: 1
    step_title: 制作黏合剂丝网或模板
    step_content: |
      按照 SMT 元器件在印制板上的位置，制作用于漏印黏合剂的丝网或模板。早期的 SMT 组装间距比较大，采用丝网漏印就能满足组装精度；近年来 SMC 小型化、SMC 引脚高密度使组装精度的要求不断提高，丝网印刷已经难以适应，用薄钢板或薄铜板制作的刚性模板更多被使用。
    note: |
      1. 根据元器件位置制作丝网或模板
      2. 早期使用丝网，现在更多使用薄钢板或薄铜板刚性模板
      3. 确保模板精度满足组装要求
    faq: |
      Q: 为什么现在更多使用刚性模板？
      A: 因为 SMC 小型化、引脚高密度，丝网印刷难以满足精度要求，刚性模板精度更高。

  - step_no: 2
    step_title: 漏印黏合剂（又称点胶过程）
    step_content: |
      把丝网或模板覆盖在印制电路板 B 面上，漏印黏合剂。要精确保证黏合剂漏印在元器件的中心，尤其要避免黏合剂污染元器件的焊盘。如果采用点胶机或手工点涂黏合剂，则这前两道工序要相应更改。
    note: |
      1. 黏合剂要漏印在元器件中心
      2. 避免黏合剂污染元器件焊盘
      3. 也可采用点胶机或手工点涂
    faq: |
      Q: 黏合剂污染焊盘会怎样？
      A: 会影响焊接质量，可能导致虚焊、脱焊等问题。

  - step_no: 3
    step_title: 贴装SMT元器件
    step_content: |
      把 SMT 元器件贴装到印制板 B 面上，使它们的电极准确定位于各自的焊盘。
    note: |
      1. 元器件电极要对准焊盘
      2. 贴装位置要准确
      3. 检查元器件方向是否正确
    faq: |
      Q: 元器件贴装偏移怎么办？
      A: 应在黏合剂固化前调整位置，确保电极对准焊盘。

  - step_no: 4
    step_title: 固化黏合剂
    step_content: |
      用加热或紫外线照射的方法，使黏合剂烘干、固化，把 SMT 元器件比较牢固地固定在印制板上。
    note: |
      1. 根据黏合剂类型选择加热或紫外线照射
      2. 控制固化温度和时间
      3. 确保元器件牢固固定
    faq: |
      Q: 固化不充分会怎样？
      A: 元器件固定不牢，波峰焊时可能脱落或移位。

  - step_no: 5
    step_title: 插装THT元器件
    step_content: |
      把印制电路板翻转 180°，在 A 面插装传统的 THT 引线元器件。
    note: |
      1. 翻转印制板 180°
      2. 在 A 面插装 THT 元器件
      3. 检查元器件引脚是否正确插入
    faq: |
      Q: THT元器件是什么？
      A: THT 是 Through Hole Technology（通孔技术）的缩写，指传统的插装元器件。

  - step_no: 6
    step_title: 波峰焊
    step_content: |
      与普通印制板的焊接工艺相同，用波峰焊设备在 B 面进行焊接。在印制板焊接过程中，SMT 元器件浸没在熔融的锡液中。可见，SMT 元器件应该具有良好的耐热性能。假如采用双波峰焊接设备，则焊接质量会好很多。
    note: |
      1. 在 B 面进行波峰焊
      2. SMT 元器件要能承受高温
      3. 推荐使用双波峰焊接设备，质量更好
      4. 控制波峰焊温度和速度
    faq: |
      Q: 为什么推荐双波峰焊接？
      A: 双波峰焊接质量更好，可以减少虚焊、漏焊等缺陷。

  - step_no: 7
    step_title: 印制板（清洗）测试
    step_content: |
      对经过焊接的印制板进行清洗，去除残留的助焊剂残渣（如果已经采用免清洗助焊剂，除非是特殊产品，一般不必清洗）。最后进行电路检验测试。
    note: |
      1. 使用免清洗助焊剂一般不必清洗
      2. 特殊产品需要清洗
      3. 进行电路检验测试
      4. 检查焊点质量
    faq: |
      Q: 什么情况下需要清洗？
      A: 如果不使用免清洗助焊剂，或者是特殊产品，需要清洗去除助焊剂残渣。