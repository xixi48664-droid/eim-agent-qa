tutorial:
  process_name: "手工浸焊工艺"
  total_steps: 4
  estimated_time: "约5-10分钟/板"

steps:
  - step_no: 1
    step_title: "锡锅加热准备"
    step_content: |
      焊前将锡锅加热，以熔化的焊锡达到230~250℃为宜。为了去掉锡层表面的氧化层，要随时加一些焊剂，通常使用松香粉。
    note: |
      1. 温度控制在230~250℃范围内
      2. 随时添加松香粉防止氧化
      3. 确保焊锡完全熔化
    faq: |
      Q: 温度过低或过高会怎样？
      A: 温度过低焊锡流动性差，焊点质量不好；温度过高可能损坏元器件和PCB。
      Q: 松香粉什么时候添加？
      A: 看到锡面有氧化层时就可以添加，也可以在焊接过程中随时添加。

  - step_no: 2
    step_title: "涂助焊剂"
    step_content: |
      在印制板上涂上一层助焊剂，一般是在松香酒精溶液中浸一下。
    note: |
      1. 使用松香酒精溶液作为助焊剂
      2. 确保整个焊接面都涂到助焊剂
      3. 助焊剂不宜过多，以免流入元件内部
    faq: |
      Q: 可以用其他助焊剂吗？
      A: 可以，但松香酒精溶液是最常用的，腐蚀性小。
      Q: 助焊剂涂多了怎么办？
      A: 可以用干净的布或纸轻轻擦去多余的部分。

  - step_no: 3
    step_title: "浸焊"
    step_content: |
      使用简单的夹具将待焊接的印制板夹着浸入锡锅中，使焊锡表面与印制板接触。在将印制板放入锡锅时，一定要保持平稳，印制板与焊锡的接触要适当，这是手工浸焊成败的关键。
    note: |
      1. 用夹具固定印制板
      2. 保持平稳，避免晃动
      3. 控制浸焊深度和时间
      4. 操作者需要一定操作技能
    faq: |
      Q: 浸焊时间多长合适？
      A: 一般3-5秒，具体根据板的大小和元件多少调整。
      Q: 浸焊深度如何控制？
      A: 焊锡面接触到PCB焊盘即可，不要浸没元件。

  - step_no: 4
    step_title: "冷却检查补焊"
    step_content: |
      拿开印制电路板，待冷却后，检查焊接质量。如有较多焊点没焊好，要重复浸焊。只有个别未焊好的，可用电烙铁手工补焊。
    note: |
      1. 等完全冷却后再检查
      2. 检查是否有虚焊、漏焊、桥连等问题
      3. 多数焊点不好则重新浸焊
      4. 个别不良用烙铁补焊
    faq: |
      Q: 怎么判断焊点质量？
      A: 好的焊点应该光亮、饱满，呈圆锥形，元件引脚清晰可见。
      Q: 桥连了怎么办？
      A: 可以用烙铁蘸松香去除，或重新浸焊时调整角度。