tutorial:
  process_name: "集成电路测试仪基本操作流程"
  total_steps: 5
  estimated_time: "视具体测试类型而定"

steps:
  - step_no: 1
    step_title: "器件好坏判别"
    step_content: |
      1）输入7400，显示"7400"。
      2）将被测器件74LS00放在锁紧插座上并锁紧。
      3）按下"好坏判别"键。
      * 若显示"PASS"同时伴有高音提示，表示器件逻辑功能完好，黄色LED灯点亮。
      * 若显示"FAIL"同时伴有低音提示，表示器件逻辑功能失效，红色LED灯点亮。
      4）若要测试多只相同器件，再次按下"好坏判别"键即可。
      5）存储器的测试时间较长，测试过程中仪器不接受任何命令输入。
    note: |
      1. 确保器件正确放置在锁紧插座上并锁紧
      2. PASS表示合格，FAIL表示不合格
      3. 测试存储器时不要操作其他按键
      4. 多只相同器件可连续测试
    faq: |
      Q: 测试时显示FAIL怎么办？
      A: 检查器件是否插反，重新插拔后再测试。
      Q: 为什么存储器测试时间长？
      A: 因为需要对所有存储单元进行读写测试。

  - step_no: 2
    step_title: "器件老化测试"
    step_content: |
      1）输入7400，显示"7400"。
      2）将被测器件74LS00放在锁紧插座上并锁紧。
      3）按下"老化"键，仪器即对被测器件进行连续老化测试，若用户想退出老化测试状态，只要按下"编辑/退出"键即可。
      4）对多只相同型号的器件进行老化测试时，每换一只器件都要重新输入型号。
    note: |
      1. 老化测试是连续进行的
      2. 按"编辑/退出"键可退出老化测试
      3. 每换一只器件都要重新输入型号
      4. 老化测试用于检测器件在长时间工作下的稳定性
    faq: |
      Q: 老化测试有什么作用？
      A: 检测器件在长时间工作下的稳定性，筛选出早期失效的器件。
      Q: 如何退出老化测试？
      A: 按"编辑/退出"键即可退出。

  - step_no: 3
    step_title: "器件型号判别"
    step_content: |
      1）将被测器件放上锁紧插座并锁紧，按"型号判别"键，显示"P"，提示用户输入被测器件引脚数目，如有14只引脚，即输入14，显示"P 14"。
      2）再次按下"型号判别"键。
      * 若被测器件逻辑功能完好，并且其型号在测试仪器的测试范围内，仪器将直接显示被测器件的型号，例如7400。
      * 若被测器件逻辑功能失效，或其型号不在测试仪器的测试范围内，仪器将显示"FAIL"。
      3）进行型号判别时，输入的器件引脚数目必须是两位数，如8只引脚输入08。
      4）由于测试仪器是以被测器件的逻辑功能来判定其型号，仪器显示的被测器件型号可能与实际型号不一致，这取决于该型号在测试软件中的存放顺序。出现这类情况时，说明仪器显示的型号与被测器件具有相同的逻辑功能。
      5）当型号被判别出后，该型号仅供显示用，并未存入仪器内部，要判别器件的好坏，仍须输入一次型号。
    note: |
      1. 引脚数目必须输入两位数（如08、14）
      2. 仪器根据逻辑功能判定型号，可能与实际型号不一致
      3. 型号判别结果仅供参考，不存入仪器
      4. 要判别好坏仍需重新输入型号测试
    faq: |
      Q: 为什么显示的型号与实际不一致？
      A: 因为仪器是根据逻辑功能判定型号，不同型号可能有相同功能。
      Q: 引脚数怎么输入？
      A: 必须输入两位数，如8只引脚输入08，14只引脚输入14。

  - step_no: 4
    step_title: "器件代换查询"
    step_content: |
      1）先输入元器件的型号，如7400，再按"代换查询"键。
      * 若在各系列存在可代换的型号，则仪器将依次显示这些型号，如7403，每按一次"代换查询"键，就换一种型号显示，直到显示"NODEVICE"。
      * 若不存在可代换的型号，则直接显示"NODEVICE"。
      2）仪器认为那些逻辑功能一致且引脚排列一致的器件为可互换的器件，并未考虑器件的其他参数，应注意此功能的使用。
    note: |
      1. 输入型号后按"代换查询"键
      2. 连续按"代换查询"键可查看所有可代换型号
      3. "NODEVICE"表示无可代换型号
      4. 代换仅考虑逻辑功能和引脚排列，不考虑其他参数
    faq: |
      Q: 代换查询的依据是什么？
      A: 逻辑功能一致且引脚排列一致。
      Q: 为什么要注意此功能的使用？
      A: 因为仪器未考虑器件的电气参数（如速度、功耗等），实际使用时需确认。

  - step_no: 5
    step_title: "EPROM查空操作"
    step_content: |
      1）输入被测器件的型号，将其放在锁紧插座上并锁紧。
      2）按"好坏判别/查空"键，仪器将对被测器件进行全空检查（是否全为FF）。若是全空，显示"EPY"；否则显示地址、数据，再显示"NO EPY"。
    note: |
      1. 查空操作检查EPROM是否全为FF
      2. "EPY"表示全空，"NO EPY"表示非全空
      3. 非全空时会显示地址和数据
      4. 查空常用于编程前确认
    faq: |
      Q: EPROM查空有什么用途？
      A: 用于编程前确认EPROM是否为空，或检查是否已被写入数据。
      Q: "NO EPY"是什么意思？
      A: 表示EPROM不是全空状态，已有数据写入。