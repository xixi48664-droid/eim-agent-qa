tutorial:
  process_name: 杯型焊件焊接工艺
  total_steps: 5
  estimated_time: 约 1-2 分钟/焊点
steps:
  - step_no: 1
    step_title: 焊前准备
    step_content: |
      尺寸较大的接线柱和接插件散热较快，焊接前要先对导线进行处理，绞紧各股软线，然后镀锡，对杯形件也要进行处理。选用功率较大的电烙铁。
    note: |
      1. 杯型焊件一般与多股软线连接
      2. 导线需绞紧并镀锡处理
      3. 选用功率较大的电烙铁
      4. 杯形件也需进行处理
    faq: |
      Q: 为什么需要选用功率较大的电烙铁？
      A: 尺寸较大的接线柱和接插件散热较快，焊接时间不足容易造成"冷焊"，所以需要功率较大的电烙铁。

  - step_no: 2
    step_title: 滴助焊剂
    step_content: |
      往杯形孔内滴助焊剂。若孔较大，用脱脂棉签蘸助焊剂在孔内均匀擦一层。
    note: |
      1. 助焊剂要均匀覆盖杯形孔内壁
      2. 孔较大时用脱脂棉签擦拭
      3. 助焊剂有助于提高焊接质量
    faq: |
      Q: 助焊剂有什么作用？
      A: 助焊剂可以去除氧化层，提高焊锡的流动性，帮助形成良好的焊点。

  - step_no: 3
    step_title: 加热并填锡
    step_content: |
      用电烙铁加热并将锡熔化，靠浸润作用流满内孔。
    note: |
      1. 电烙铁要充分加热杯形件
      2. 让焊锡靠浸润作用自然流满内孔
      3. 确保杯形孔内填满焊锡
    faq: |
      Q: 焊锡流不满怎么办？
      A: 检查杯形件是否充分加热，助焊剂是否足够，必要时可以再次加热并补充焊锡。

  - step_no: 4
    step_title: 插入导线
    step_content: |
      将导线垂直插入到孔的底部，看到导线已经被焊锡充分润湿后才能移开电烙铁。在焊锡凝固前，切不可移动导线。
    note: |
      1. 导线要垂直插入到孔底
      2. 确认导线被焊锡充分润湿后再移开烙铁
      3. 焊锡凝固前绝对不能移动导线
      4. 避免出现"冷焊"现象
    faq: |
      Q: 什么是"冷焊"？
      A: 焊接时间不足、温度不够时，焊锡没有充分浸润焊件表面就凝固，形成虚焊或不牢固的焊点。

  - step_no: 5
    step_title: 套套管
    step_content: |
      完全凝固后立即套上套管，使套管紧紧包裹接线柱和导线的连接处。
    note: |
      1. 必须等焊锡完全凝固后再套套管
      2. 套管要包裹住整个连接处
      3. 套管起到绝缘和保护作用
    faq: |
      Q: 套管有什么作用？
      A: 套管可以起到绝缘保护、防止短路、增强机械强度和美观的作用。