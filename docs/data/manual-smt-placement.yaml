tutorial:
  process_name: 手工贴装SMT元器件
  total_steps: 6
  estimated_time: 约 10-30 分钟/板
  note: |
    在手工贴片前必须保证焊盘清洁。新电路板上的焊盘都比较干净，但返修的电路板在拆掉旧元件以后，焊盘上就会有残留的焊料。贴装元器件到返修位置上之前，必须先用手工或半自动的方法清除残留在焊盘上的焊料。可使用电烙铁、吸锡线、手动吸锡器或用真空吸锡泵把焊料吸走。但要特别小心，在组装密度越来越大的情况下，操作比较困难并且容易损坏其他元器件及线路板。
steps:
  - step_no: 1
    step_title: 涂抹助焊剂和焊膏
    step_content: |
      手工贴片之前，需要先在电路板的焊接部位涂抹助焊剂和焊膏。可以用刷子把助焊剂直接刷涂到焊盘上，也可以采用简易印刷工装进行手工印刷锡膏或手动滴涂焊膏。
    note: |
      1. 在焊接部位涂抹助焊剂和焊膏
      2. 可用刷子刷涂助焊剂
      3. 也可手工印刷锡膏或手动滴涂焊膏
    faq: |
      Q: 为什么要先涂助焊剂和焊膏？
      A: 助焊剂可以去除氧化层，提高焊接质量；焊膏用于固定元器件并形成焊点。

  - step_no: 2
    step_title: 准备手工贴片工具
    step_content: |
      采用手工贴片工具贴放 SMT 元器件。手工贴片的工具有：不锈钢镊子、吸笔、3 ~ 5 倍台式放大镜或 5 ~ 20 倍立体显微镜、防静电工作台、防静电腕带。
    note: |
      1. 使用不锈钢镊子、吸笔
      2. 使用 3 ~ 5 倍放大镜或 5 ~ 20 倍显微镜
      3. 在防静电工作台上操作
      4. 佩戴防静电腕带
    faq: |
      Q: 为什么需要防静电措施？
      A: 防止静电损坏敏感电子元器件。

  - step_no: 3
    step_title: 贴装SMC片状元件
    step_content: |
      用镊子夹持元件，把元件焊端对齐两端焊盘，居中贴放在焊膏上，用镊子轻轻按压，使焊端浸入焊膏。
    note: |
      1. 焊端对齐焊盘，居中贴放
      2. 轻按使焊端浸入焊膏
    faq: |
      Q: SMC元件贴装要点是什么？
      A: 焊端对齐两端焊盘，居中贴放，轻按使焊端浸入焊膏。

  - step_no: 4
    step_title: 贴装SOT
    step_content: |
      用镊子夹持 SOT 元件，对准方向，对齐焊盘，居中贴放在焊膏上，确认后用镊子轻轻按压元件，使浸入焊膏中的引脚不小于引脚厚度的 1/2。
    note: |
      1. 对准方向，对齐焊盘
      2. 引脚浸入焊膏不小于引脚厚度的 1/2
    faq: |
      Q: SOT元件贴装需要注意什么？
      A: 要对准方向，引脚浸入焊膏不小于引脚厚度的 1/2。

  - step_no: 5
    step_title: 贴装SOP、QFP
    step_content: |
      器件第 1 脚或前端标志对准印制板上的定位标志，用镊子夹持或吸笔吸取器件，对齐两端或四边焊盘，居中贴放在焊膏上，用镊子轻轻按压器件封装的顶面，使浸入焊膏中的引脚不小于引脚厚度的 1/2。贴装引脚间距在 0.65 mm 以下的窄间距器件时，可在 3 ~ 20 倍的放大镜或显微镜下操作。
    note: |
      1. 第 1 脚或前端标志对准定位标志
      2. 对齐两端或四边焊盘，居中贴放
      3. 引脚浸入焊膏不小于引脚厚度的 1/2
      4. 窄间距器件（≤0.65 mm）在放大镜/显微镜下操作
    faq: |
      Q: 窄间距器件贴装需要注意什么？
      A: 引脚间距 0.65 mm 以下的器件，需要在 3 ~ 20 倍放大镜或显微镜下操作。

  - step_no: 6
    step_title: 贴装SOJ、PLCC
    step_content: |
      与贴装 SOP、QFP 的方法相同，只是由于 SOJ、PLCC 的引脚在器件四周的底部，需要把印制板倾斜 45°角来检查芯片是否对中、引脚是否与焊盘对齐。
      贴装元器件以后，用手工、半自动或自动的方法进行焊接。
    note: |
      1. 贴装方法与 SOP、QFP 相同
      2. 倾斜 45°检查芯片是否对中、引脚是否与焊盘对齐
      3. 确认贴装无误后再焊接
    faq: |
      Q: SOJ、PLCC贴装需要特别检查什么？
      A: 需要把印制板倾斜 45°角来检查芯片是否对中、引脚是否与焊盘对齐。