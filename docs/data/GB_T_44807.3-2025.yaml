- standard_code: GB/T 44807.3-2025
  standard_name: 集成电路电磁兼容建模 第3部分：集成电路电磁干扰特性仿真模型 辐射发射建模（ICEM-RE）
  section: ''
  summary: 该规范在电子信息制造业中重点用于半导体器件选型、来料验证、湿敏/可靠性控制和失效判定。当前未获取到官网 PDF/正文目录中的真实章节号和章节名称，section 按录入规则留空；应用时应从正式标准文本提炼工艺参数、试验条件、验收判据、记录要求和不合格处置要求，并转换为作业指导书、检验规范、设备点检项目或质量审核清单。对涉及客户等级、产品等级、可靠性等级或法规合规的条款，应在项目导入、首件确认、量产巡检和出货评审中保持一致引用。
    来源：https://openstd.samr.gov.cn/bzgk/std/newGbInfo?hcno=E34D6CA99BF3EB8F2E494A842CB97C13
  tags: 半导体,元器件,可靠性,EMC,测试,电路设计,图形符号,GB标准,国家标准
