tutorial:
  process_name: SMT印制板再流焊工艺
  total_steps: 5
  estimated_time: 约 30-60 分钟/板
steps:
  - step_no: 1
    step_title: 制作焊锡膏丝网
    step_content: |
      按照 SMT 元器件在印制板上的位置及焊盘的形状，制作用于漏印焊锡膏的丝网或模板。
    note: |
      1. 根据元器件位置和焊盘形状制作
      2. 可使用丝网或模板
      3. 确保模板精度满足要求
    faq: |
      Q: 丝网和模板有什么区别？
      A: 丝网适用于间距较大的情况，模板精度更高，适用于高密度组装。

  - step_no: 2
    step_title: 漏印焊锡膏
    step_content: |
      把焊锡膏丝网或模板覆盖在印制电路板上，漏印焊锡膏，要精确保证焊锡膏均匀地漏印在元器件的电极焊盘上。
      请注意：这两道工序所涉及的"焊锡膏丝网或模板"和"漏印焊锡膏"，与 SMT 印制板波峰焊工艺漏印黏合剂相似，只不过把漏印的材料换成焊锡膏。
    note: |
      1. 焊锡膏要均匀漏印在焊盘上
      2. 位置要精确
      3. 与波峰焊的漏印黏合剂类似，只是材料不同
    faq: |
      Q: 焊锡膏漏印不均匀会怎样？
      A: 会导致焊点质量问题，如锡量过多造成桥连，锡量过少造成虚焊。

  - step_no: 3
    step_title: 贴装SMT元器件
    step_content: |
      把 SMT 元器件贴装到印制板上，有条件的企业采用不同档次的贴装设备，在简单的条件下也可以手工贴装。无论采用哪种方法，关键是使元器件的电极准确定位于各自的焊盘。
    note: |
      1. 可使用贴装设备或手工贴装
      2. 元器件电极要对准焊盘
      3. 检查元器件方向是否正确
    faq: |
      Q: 可以手工贴装吗？
      A: 在简单条件下可以手工贴装，但要确保电极准确定位。

  - step_no: 4
    step_title: 再流焊
    step_content: |
      用再流焊设备进行焊接。
    note: |
      1. 使用再流焊设备
      2. 控制温度曲线
      3. 确保焊点质量
    faq: |
      Q: 再流焊温度曲线如何设置？
      A: 一般分为预热区、恒温区、回流区、冷却区，具体参数根据焊锡膏厂家推荐设置。

  - step_no: 5
    step_title: 印制板（清洗）测试
    step_content: |
      根据产品要求和工艺材料的性质，选择印制板清洗工艺或免清洗工艺。最后对电路板进行检查测试。
    note: |
      1. 根据产品要求选择清洗或免清洗
      2. 使用免清洗焊锡膏一般不必清洗
      3. 进行电路检查测试
      4. 检查焊点质量
    faq: |
      Q: 什么情况需要清洗？
      A: 如果不使用免清洗焊锡膏，或者产品有特殊要求，需要清洗去除助焊剂残渣。