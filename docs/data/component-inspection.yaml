tutorial:
  process_name: "元器件外观质量检验规范"
  total_steps: 5
  estimated_time: "视检验数量而定"

steps:
  - step_no: 1
    step_title: "封装与尺寸检查"
    step_content: |
      检查元器件的封装、外形尺寸、电极引线的位置和直径是否符合产品标准外形图的规定。对照图纸或规格书，确认元器件的整体尺寸、引脚间距、引脚直径等参数符合要求。
    note: |
      1. 必须对照产品标准外形图进行检查
      2. 注意引脚位置和直径的公差要求
      3. 封装形式需与设计要求一致
      4. 批量检验时需进行首件确认
    faq: |
      Q: 尺寸偏差在什么范围内可以接受？
      A: 根据具体产品标准，一般允许±0.1mm的偏差，精密器件要求更严格。
      Q: 如何快速检查大批量元器件？
      A: 可以制作专用治具或使用游标卡尺、显微镜进行抽检。

  - step_no: 2
    step_title: "外观表面检查"
    step_content: |
      检查元器件外观应完好无损，其表面无凹陷、划痕、裂口、污垢和锈斑；外部涂涂层不能有起泡、脱落和擦伤现象。用目视或放大镜观察元器件表面，确保无明显缺陷。
    note: |
      1. 表面应清洁、无污渍和锈斑
      2. 涂层应完好，无起泡、脱落
      3. 壳体无裂纹、缺口
      4. 必要时使用放大镜检查
    faq: |
      Q: 轻微划痕是否可以接受？
      A: 根据产品要求，轻微划痕不影响功能时可判定合格，但需记录。
      Q: 表面有污渍怎么办？
      A: 可尝试用酒精擦拭清洁，无法清洁的判定为不合格。

  - step_no: 3
    step_title: "电极引线检查"
    step_content: |
      检查电极引线应镀层光洁，无压折或扭曲，没有影响焊接的氧化层、污垢、伤痕和焊接痕迹。观察引线表面是否有氧化变色、弯曲变形等问题。
    note: |
      1. 引线镀层应光洁，无氧化发黑
      2. 引线无弯曲、折痕
      3. 无焊接残留或伤痕
      4. 引线直径均匀一致
    faq: |
      Q: 引线有轻微氧化怎么办？
      A: 轻微氧化可尝试用橡皮擦擦拭，严重氧化则判定不合格。
      Q: 引线弯曲可以矫正吗？
      A: 轻微弯曲可手工矫正，严重变形则不建议使用。

  - step_no: 4
    step_title: "标志与标识检查"
    step_content: |
      检查各种型号、规格标志应完整、清晰、牢固；特别是元器件参数的分档标志、极性符号和集成电路的种类型号，其标志、字符不能模糊不清、脱落或有摩擦痕迹。
    note: |
      1. 型号、规格标志应清晰可辨
      2. 极性符号（如二极管、电容正负极）必须明确
      3. 标志应牢固，不易脱落
      4. 集成电路型号和批号应完整
    faq: |
      Q: 标志模糊不清怎么办？
      A: 无法辨认型号的元器件不能使用，需退回供应商。
      Q: 极性标志不清楚会有什么问题？
      A: 可能导致装配错误，损坏元器件或电路板。

  - step_no: 5
    step_title: "活动部件检查"
    step_content: |
      对于电位器、可变电容或可调电感等元器件，在其调节范围内应该活动平顺、灵活，松紧适当，无机械杂音；开关类元件应该保证接触良好，动作迅速。手动操作活动部件，检查其手感和功能。
    note: |
      1. 电位器调节应平滑，无卡顿
      2. 开关动作应迅速、接触可靠
      3. 无机械杂音或异常阻力
      4. 可调元件应在全范围内活动正常
    faq: |
      Q: 电位器有轻微杂音正常吗？
      A: 轻微摩擦声属正常，若有明显咔嗒声或卡顿则不合格。
      Q: 开关接触不良怎么办？
      A: 可尝试清洁触点，无效则判定不合格。