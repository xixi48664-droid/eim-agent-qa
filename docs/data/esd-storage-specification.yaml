tutorial:
  process_name: "电子元器件保管防静电措施规范"
  total_steps: 5
  estimated_time: "持续执行"

steps:
  - step_no: 1
    step_title: "张贴防静电警示标志"
    step_content: |
      在储存、保管电子元器件的场所必须张贴防静电警示标志。警示标志应醒目、清晰，提醒工作人员注意防静电安全，遵守防静电操作规程。标志应张贴在仓库入口、货架附近等显眼位置。
    note: |
      1. 警示标志应清晰醒目
      2. 张贴在显眼位置
      3. 提醒工作人员遵守防静电规程
      4. 标志内容应符合相关标准
    faq: |
      Q: 警示标志有什么要求？
      A: 应符合国家标准，内容清晰，易于识别。
      Q: 应该贴在哪些位置？
      A: 仓库入口、货架附近、工作台上方等显眼位置。

  - step_no: 2
    step_title: "控制仓库环境湿度"
    step_content: |
      储存、保管电子元器件的仓库环境不能过于干燥，应该把空间的相对湿度控制在40%~60%的范围之内。湿度比较高，有利于避免静电积累。可使用加湿器或除湿设备调节湿度。
    note: |
      1. 相对湿度控制在40%~60%
      2. 湿度过低易产生静电
      3. 使用加湿或除湿设备调节
      4. 定期监测湿度
    faq: |
      Q: 为什么湿度高有利于防静电？
      A: 湿度高时空气导电性能好，静电容易释放。
      Q: 湿度超过60%有问题吗？
      A: 湿度过高可能导致元器件受潮，需控制在适当范围。

  - step_no: 3
    step_title: "使用防静电货架"
    step_content: |
      存放电子元器件的货架必须使用金属（导体）材料制作，货架应该具备接地设施。确保货架与接地系统可靠连接，使静电能够及时泄放。
    note: |
      1. 货架必须使用金属材料
      2. 必须具备接地设施
      3. 接地要可靠
      4. 定期检查接地是否良好
    faq: |
      Q: 为什么货架要用金属材料？
      A: 金属是导体，便于静电传导和释放。
      Q: 接地电阻有什么要求？
      A: 一般要求接地电阻≤10Ω。

  - step_no: 4
    step_title: "使用防静电容器分装"
    step_content: |
      取用电子元器件，假如要对原供货商提供的包装拆封，必须使用防静电的容器分装，绝对不能用普通塑料袋包装。防静电容器包括防静电袋、防静电盒、防静电周转箱等。
    note: |
      1. 拆封后必须使用防静电容器
      2. 禁止使用普通塑料袋
      3. 选择合适的防静电容器
      4. 容器应具备防静电标识
    faq: |
      Q: 为什么不能用普通塑料袋？
      A: 普通塑料袋是绝缘体，易产生和积累静电，可能损坏元器件。
      Q: 防静电容器有哪些类型？
      A: 防静电袋、防静电盒、防静电周转箱等。

  - step_no: 5
    step_title: "佩戴防静电手环"
    step_content: |
      工作人员存放、取用电子元器件时，必须佩戴防静电手环，并保证腕带良好接地。佩戴时应确保手环与皮肤良好接触，接地夹可靠连接到接地系统。
    note: |
      1. 工作时必须佩戴防静电手环
      2. 手环必须良好接地
      3. 确保与皮肤良好接触
      4. 定期测试手环性能
    faq: |
      Q: 手环不接地有效果吗？
      A: 没有，必须接地才能将静电释放。
      Q: 如何检查手环是否正常？
      A: 使用腕带测试仪进行测试，显示PASS即为正常。