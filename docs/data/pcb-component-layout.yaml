tutorial:
  process_name: "元器件PCB布局流程"
  total_steps: 4
  estimated_time: "视电路复杂度而定"

steps:
  - step_no: 1
    step_title: "总体把握电路内部的基本连接关系"
    step_content: |
      在进行有针对性布局前，建议首先打印电路原理图，以便随时观察、对照元器件之间的电气连接关系，进行有针对性的布局。
    note: |
      1. 先打印电路原理图，方便对照
      2. 理解元器件之间的电气连接关系
      3. 为后续布局做好准备
      4. 对电路整体架构有清晰认识
    faq: |
      Q: 为什么要先看原理图？
      A: 了解元器件间的连接关系，才能进行合理布局，避免连线过长或交叉过多。
      Q: 一定要打印出来吗？
      A: 不一定，也可以在电脑上查看，但打印出来更方便对照和标注。

  - step_no: 2
    step_title: "布局对位置有特殊要求的元器件"
    step_content: |
      PCB的固定孔/定位孔、信号与电源接插件、对安装位置有特殊要求的元器件均需提前布局。
    note: |
      1. 先确定固定孔和定位孔位置
      2. 信号与电源接插件要放在合适位置
      3. 有特殊安装要求的元器件提前安排
      4. 这些是PCB布局的基础框架
    faq: |
      Q: 为什么要先布局特殊要求的元器件？
      A: 这些元器件位置相对固定，是布局的基础，先确定它们才能安排其他元件。
      Q: 接插件一般放在哪里？
      A: 通常放在PCB边缘，方便外部连接。

  - step_no: 3
    step_title: "定位核心单元"
    step_content: |
      根据元器件之间的隶属关系及连接关系，找到电路中的核心单元（如集成器件），原则上需将其布置在PCB的中间位置。每个电路板中的核心单元的数量有限，而且比较容易识别。对于单芯片电路，芯片自然是系统的核心单元；对于单片机电路，CPU是系统的绝对核心；对于模拟电路系统，按照信号走向，信号链上的所有芯片都属于核心单元。
    note: |
      1. 核心单元通常放在PCB中间位置
      2. 单芯片电路：芯片是核心
      3. 单片机电路：CPU是核心
      4. 模拟电路：信号链上的芯片是核心
    faq: |
      Q: 核心单元为什么放在中间？
      A: 方便周边元件围绕布置，减少连线长度，提高布线通过率。
      Q: 如何确定核心单元？
      A: 根据电路功能，找出对整个系统性能起关键作用的元件。

  - step_no: 4
    step_title: "按照就近原则布置外围元器件"
    step_content: |
      依据集成器件与外围元器件的连接关系，将外围元器件按照就近原则摆放在PCB的合适位置，先布置底面积较大的元器件，再布置底面积较小的元器件。综上所迷，元器件布局需参照"飞线"所确认的关系，对相应的元器件进行移动、旋转等基本操作，完成元器件的预布局，适当减少飞线之间的交叉。
    note: |
      1. 按照就近原则布置外围元件
      2. 先放大元件，后放小元件
      3. 参照飞线进行布局
      4. 减少飞线交叉，提高布线通过率
    faq: |
      Q: 什么是就近原则？
      A: 有电气连接的元器件尽量靠近放置，减少连线长度。
      Q: 为什么先放大元件？
      A: 大元件占位大，先放置可以更好地规划空间，避免后期空间不足。

  - step_no: 5
    step_title: "元器件布局注意事项"
    step_content: |
      1）原则上不要对元器件进行翻转操作：随意的元器件翻转有可能使集成电路被错误地镜像处理，本来需要插装在TopLayer（顶层）的元器件，结果只能被反向插装在BottomLayer（底层），影响美观及可靠性。
      2）保持元器件之间的相对距离：如果两只元器件在PCB设计区中的距离过近，那么在后续的装配、焊接工序中，将导致插入第一只元器件后，第二只元器件无法按照正常方式插入的故障现象。系统将两只摆放距离过近的元器件以绿色高亮状态显示，以提醒设计者拉开两只元器件之间的相对距离。
      3）提高元器件在PCB中的摆放精度：在PCB设计窗口中单击【设计】→【板参数选项...】菜单项，在"器件网格"栏中，将X、Y步进值从20mil减小为5mil，以改善元器件在PCB板框内的移动精度。
    note: |
      1. 不要随意翻转元器件
      2. 保持元器件间的合理距离
      3. 适当提高摆放精度（5mil比20mil更精确）
      4. 注意装配和焊接的可操作性
    faq: |
      Q: 为什么不能翻转元器件？
      A: 翻转可能导致元件镜像，顶层元件变底层，影响装配和可靠性。
      Q: 距离多近算过近？
      A: 至少要保证后续装配和焊接操作空间，通常参考元件封装间距要求。