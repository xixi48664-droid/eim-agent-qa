- standard_code: GB/T 37977.41-2024
  standard_name: 静电学 第4-1部分：特定应用中的标准试验方法 地板覆盖层和装配地板的电阻
  section: ''
  summary: 该规范在电子信息制造业中重点用于ESD 防护区建设、人员接地、敏感器件包装转运和实时监控。当前未获取到官网 PDF/正文目录中的真实章节号和章节名称，section 按录入规则留空；应用时应从正式标准文本提炼工艺参数、试验条件、验收判据、记录要求和不合格处置要求，并转换为作业指导书、检验规范、设备点检项目或质量审核清单。对涉及客户等级、产品等级、可靠性等级或法规合规的条款，应在项目导入、首件确认、量产巡检和出货评审中保持一致引用。
