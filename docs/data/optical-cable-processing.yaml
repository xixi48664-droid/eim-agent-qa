tutorial:
  process_name: "光缆加工流程"
  total_steps: 9
  estimated_time: "约30-60分钟/个"

steps:
  - step_no: 1
    step_title: "光缆的准备"
    step_content: |
      剥掉外护套，套上扩展帽及缆支持，具体操作有5步：
      1）用环切工具来剥掉光缆的外套。
      2）使用环切工具上的刀片调整螺钉，设定刀片深度为7.6 mm。各类光缆刀切要求见表5-2。
      3）在光缆末端的96.5 cm处环切外护套（内层），将内外护套滑出。
      4）对光缆装上缆支持、扩展帽操作。
      5）先从光纤的末端将扩展帽套上（尖端在前）向里滑动，再从光纤末端将缆支持套上（尖端在前）向里滑动。
    note: |
      1. 环切深度要准确，避免伤到内部光纤
      2. 不同类型光缆刀切深度不同，按表5-2要求设置
      3. 套扩展帽和缆支持时要注意方向，尖端在前
      4. 滑动时用力要均匀
    faq: |
      Q: 环切深度太深会怎样？
      A: 可能切断内部光纤或缓冲层，导致光缆报废。
      Q: 如何确定环切深度是否合适？
      A: 根据光缆类型参考表5-2，或先在废弃光缆上试切。

  - step_no: 2
    step_title: "用模板上规定的长度时需要对安装接头的光纤作标记"
    step_content: |
      不同类型的光纤及STII插头长度的规定不同，使用SC模板，量取光纤外套的长度，用记号笔按模板刻度所示位置，在外套上做记号。缓冲层光纤和SBJ光纤的长度规定见表5-3。
    note: |
      1. 使用对应的模板（陶瓷类型或塑料类型）
      2. 标记要准确、清晰
      3. 标记位置在光纤外套上
    faq: |
      Q: 陶瓷类型和塑料类型光纤长度有什么不同？
      A: 缓冲层光纤陶瓷类型16.5~19.1mm，塑料类型6.5~7.6mm；SBJ光纤陶瓷类型18.1~20.6mm，塑料类型7.9~9.2mm。
      Q: 标记位置偏差有影响吗？
      A: 有，会影响后续剥线长度和连接器安装质量，应尽量准确。

  - step_no: 3
    step_title: "准备好剥线器，用剥线器将光纤的外衣剥去"
    step_content: |
      1）使用剥线器前要用刷子刷去刀口处的粉尘。
      2）对有缓冲层的光纤使用"5B5机械剥线器"，对有纱线的SBJ光纤要使用"线剥线器"。利用"5B5机械剥线器"剥缓冲器光纤的外衣，具体操作有7步：
      ① 将剥线器深度按要求长度设置好。打开剥线器手柄，将光纤插入剥线器导管中，用手紧握并使它们牢固地关闭，然后将光纤从剥线器中拉出。（注意：每次用5B5剥线器剥光纤的外衣后，要用与5B5一起提供的刷子把刀口刷干净。）
      ② 用沾有酒精的纸/布从缓冲层向前擦拭，去掉光纤上残留的外衣，要求至少要细心擦拭两次才合格，且擦拭时不能使光纤弯曲。
      切记：不要用干布擦拭没有外衣的光纤，这会造成光纤表面缺陷，也不要触摸裸露的光纤或让光纤与其他物体接触。
      ③ 利用"剥线器"剥除SBJ光纤的外衣。
      ④ 使用6in刻度尺测量并标记合适的光纤长度（用模板亦可）。
      ⑤ 用"线剥线器"上的2号刻槽一小段一小段地去掉外衣，剥线时要用直的拉力，直到剥到标记处为止，切勿弯曲光缆。
      ⑥ 对于SBJ光纤，还要在离标记1.6 mm处剪去纱线。
      ⑦ 用沾有酒精的纸/布细心擦拭光缆两次。
    note: |
      1. 使用前一定要清洁剥线器刀口
      2. 根据光纤类型选择合适的剥线器
      3. 剥线时用直拉力，切勿弯曲光纤
      4. 裸露的光纤不要用干布擦，也不要触摸
      5. 每次剥完都要清洁刀口
    faq: |
      Q: 5B5机械剥线器和线剥线器有什么区别？
      A: 5B5用于缓冲层光纤，线剥线器用于有纱线的SBJ光纤。
      Q: 为什么不能触摸裸露的光纤？
      A: 手上的油脂会污染光纤表面，影响光学性能和连接质量。

  - step_no: 4
    step_title: "放置光纤"
    step_content: |
      将准备好的光纤放在"保持块"上。
    note: |
      1. 保持块要清洁
      2. 光纤放置要稳妥，避免滚动或掉落
      3. 裸露的光纤部分不要碰到其他物体
    faq: |
      Q: 没有保持块可以用什么替代？
      A: 可以用干净的V形槽或其他能稳定放置光纤的装置。

  - step_no: 5
    step_title: "环氧树脂和注射器的准备"
    step_content: |
      从针管中除去气泡。方法是：将注射器针头竖直向上，压后部的塞子，使环氧树脂从注射器针头中出来（用纸擦去），直到环氧树脂是清澈的。
    note: |
      1. 注射器针头要竖直向上
      2. 慢慢压塞子，避免产生更多气泡
      3. 确保环氧树脂清澈无气泡
      4. 擦除溢出的环氧树脂
    faq: |
      Q: 为什么要除去气泡？
      A: 气泡会影响环氧树脂的粘接强度和光学性能，导致连接质量下降。
      Q: 环氧树脂有气泡怎么办？
      A: 继续排气直到气泡完全排出，环氧树脂清澈为止。

  - step_no: 6
    step_title: "在缓冲层的光纤上安装STII连接器插头"
    step_content: |
      1）将装有环氧树脂的注射器针头插入STII连接器的背后，直到其底部，压注射器塞，慢慢地将环氧树脂注入连接器，直到一个大小合适的泡出现在连接器陶瓷尖头上平滑部分为止。
      2）用注射器针头给光纤上涂上一薄层环氧树脂外衣，大约到缓冲器外衣的12.5 mm处。若为SBJ光纤，则对剪剩下的纱线末端也要涂上一层环氧树脂。
      3）将缓冲器光纤的"支撑（引导）"滑动到连接器后部的筒上去，旋转"支撑（引导）"以使提供的环氧树脂在筒上均匀分布。
      4）向扩展器帽的螺纹上注射一滴环氧树脂，将扩展帽滑向"支撑（引导）"，并将扩展帽通过螺纹拧到连接器体中去，确保光纤就位。
      5）往连接器上加保持器。将保持器拧到连接器上去，压缩连接器的弹簧，直到保持器的凸起完全锁进连接器的切下部分。
    note: |
      1. 注入环氧树脂量要适当，出现合适大小的泡即可
      2. 光纤涂层要均匀，不要太厚或太薄
      3. 旋转支撑使环氧树脂分布均匀
      4. 扩展帽要拧紧，确保光纤就位
      5. 保持器要完全锁定到位
    faq: |
      Q: 环氧树脂注入太多怎么办？
      A: 擦去多余部分，避免污染连接器前端。
      Q: 如何确保光纤正确就位？
      A: 拧扩展帽时感觉光纤到位即可，不要用力过度。

  - step_no: 7
    step_title: "烘烤环氧树脂"
    step_content: |
      对安装好连接器的光纤进行烘烤，使环氧树脂固化。
    note: |
      1. 按照环氧树脂要求的温度和时间烘烤
      2. 烘烤时光纤要保持平直
      3. 避免温度过高或过低
    faq: |
      Q: 烘烤温度和时间一般是多少？
      A: 不同环氧树脂要求不同，一般100-150°C，10-30分钟，参考材料说明。
      Q: 烘烤不足或过度会怎样？
      A: 烘烤不足固化不完全，强度不够；烘烤过度可能损坏光纤或连接器。

  - step_no: 8
    step_title: "切断光纤"
    step_content: |
      1）用切断工具在连接器尖上伸出光纤的一面上刻痕。
      2）刻痕后，利用刀口推力将连接器尖端处的光纤切去。
    note: |
      1. 刻痕位置要准确，在连接器尖端处
      2. 刻痕力度要适当，不要太深或太浅
      3. 切断时用力要平稳
      4. 切断后检查端面是否平整
    faq: |
      Q: 刻痕太浅切不断怎么办？
      A: 可适当加深刻痕，或用专用切割工具。
      Q: 切断面不平整怎么办？
      A: 后续磨光工序可以修正，只要不是严重缺陷。

  - step_no: 9
    step_title: "磨光"
    step_content: |
      应注意一粒灰尘就能阻碍光纤末端的磨光。
      （1）先做准备工作：清洁所有用来进行磨光工作的物品。
      （2）再做初始磨光：先将磨光砂纸放在手掌心中，对光纤头轻轻地磨几下。开始时需要用非常轻的压力进行磨，以大约80 mm高的8字形来进行磨光运动，当继续磨光时，逐步增加压力。
      （3）最后做最终磨光：将磨光纸放在玻璃板上，以大约100 mm高的8字形运动进行磨光。
      （4）检查：用显微镜镜头管照亮连接器尖头，使光回照光纤相反一端，检查光纤头有无抓痕、裂口、空隙。
    note: |
      1. 一定要先清洁所有磨光用品，避免灰尘影响
      2. 初始磨光用轻压力，8字形运动
      3. 最终磨光在玻璃板上进行，8字形运动
      4. 用显微镜检查端面质量
      5. 有缺陷需要重新磨光
    faq: |
      Q: 为什么用8字形运动？
      A: 8字形运动可以使端面磨得更均匀，避免出现单向磨痕。
      Q: 磨光后发现有缺陷怎么办？
      A: 轻微缺陷可继续磨光，严重缺陷可能需要重新制作。
      Q: 如何判断磨光质量合格？
      A: 显微镜下观察，端面平整，无抓痕、裂口、空隙。