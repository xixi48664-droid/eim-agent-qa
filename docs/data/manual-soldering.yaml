tutorial:
  process_name: 手工焊接工艺
  total_steps: 6
  estimated_time: 约 2-4 秒/焊点
steps:
  - step_no: 1
    step_title: 准备施焊
    step_content: |
      左手拿焊丝，右手握电烙铁，进入备焊状态。要求烙铁头保持干净，无焊渣等氧化物，并在表面镀有一层焊锡。
    note: |
      1. 烙铁头应保持清洁并镀有焊锡
      2. 确保烙铁温度合适
      3. 工作区域准备好所需工具
    faq: |
      Q: 烙铁头氧化发黑怎么办？
      A: 用烙铁架上润湿的木质纤维树脂海绵蹭去杂质，或用湿布、湿海绵随时擦拭。

  - step_no: 2
    step_title: 加热焊件
    step_content: |
      烙铁头靠在两焊件的连接处，加热整个焊件，时间为 1~2 秒。对于在印制板上焊接元器件来说，要注意使烙铁头同时接触两个被焊接物。例如，导线与接线柱、元器件引线与焊盘要同时均匀受热。
    note: |
      1. 烙铁头应同时接触焊盘和元件引线，形成面接触
      2. 不要只加热引线或只加热焊盘
      3. 加热时间控制在 1-2 秒
    faq: |
      Q: 烙铁头只接触了元件引线怎么办？
      A: 调整烙铁位置，使烙铁头同时接触焊盘和引线，确保两者均匀受热。

  - step_no: 3
    step_title: 送入焊丝
    step_content: |
      焊件的焊接面被加热到一定温度时，焊锡丝从电烙铁对面接触焊件。注意：不要把焊锡丝送到烙铁头上！
    note: |
      1. 焊锡丝应从烙铁对面接触焊件
      2. 不要直接将焊锡丝送到烙铁头上
      3. 焊锡丝熔化量要靠观察决定
    faq: |
      Q: 焊锡应该从哪里送入？
      A: 从电烙铁对面接触焊件，利用焊件的热量熔化焊锡丝，而不是直接在烙铁头上熔化。

  - step_no: 4
    step_title: 移开焊丝
    step_content: |
      当焊丝熔化一定量后，立即向左上 45°方向移开焊丝。
    note: |
      1. 焊丝熔化量要适中，覆盖焊盘即可
      2. 移开方向为左上 45°
      3. 及时移开，避免焊锡过多
    faq: |
      Q: 焊锡熔化太多怎么办？
      A: 可以将烙铁头靠在焊盘边缘，让多余的焊锡流走，或用烙铁头吸走多余焊锡。

  - step_no: 5
    step_title: 移开电烙铁
    step_content: |
      焊锡浸润焊盘和焊件的施焊部位以后，向右上 45°方向移开电烙铁，结束焊接。从第三步开始到第五步结束，时间也是 1~2 秒。
    note: |
      1. 移开方向为右上 45°
      2. 从送丝到移开烙铁控制在 1-2 秒
      3. 在焊锡凝固之前不能移动焊件
      4. 烙铁撤离要及时，角度和方向与焊点形成有关
    faq: |
      Q: 烙铁应该怎么撤离？
      A: 向右上 45°方向撤离，这样可以保证焊点锡量合适。不同撤离方向对焊点锡量有影响。

  - step_no: 6
    step_title: 焊接要领补充
    step_content: |
      1. 保持烙铁头的清洁：随时用烙铁架上润湿的木质纤维树脂海绵蹭去烙铁头上的杂质
      2. 靠增加接触面积来加快传热：让烙铁头与焊件形成面接触而不是点或线接触
      3. 加热要靠焊锡桥：在烙铁头上保留少量焊锡作为传热桥梁
      4. 电烙铁撤离有讲究：沿烙铁轴向 45°撤离可获得合适的锡量
      5. 在焊锡凝固之前不能动：焊接手法要稳，切勿使焊件移动或受到振动
      6. 焊锡用量要适中：焊锡丝的直径应该小于焊盘的直径
    note: |
      1. 焊锡过多易造成短路，过少则不牢固
      2. 焊锡桥的锡量不可保留过多
      3. 长寿型烙铁头不能用锉刀锉
      4. 对于热容量小的焊件可简化为三步操作
    faq: |
      Q: 五步操作法可以简化吗？
      A: 对于热容量小的焊件，可以简化为三步：准备 → 加热与送丝 → 去丝移烙铁。
      Q: 焊锡用量怎么判断？
      A: 焊锡丝直径应小于焊盘直径，形成合适的圆锥状焊点，既不过多也不过少。
