tutorial:
  process_name: "锡膏储存与使用规范"
  total_steps: 5
  estimated_time: "视具体使用量而定"

steps:
  - step_no: 1
    step_title: "收货与储存"
    step_content: |
      锡膏一般要保存在5°C~10°C的低温环境下，可以储存在电冰箱的冷藏室内。过期的锡膏不能再继续使用。储存时需注意先进先出，避免锡膏过期。
    note: |
      1. 储存温度严格控制在5°C~10°C
      2. 需遵守先进先出原则
      3. 过期锡膏严禁使用
      4. 储存环境需干燥、洁净，避免污染
    faq: |
      Q: 锡膏可以冷冻保存吗？
      A: 不可以，冷冻会破坏锡膏的化学结构，影响焊接质量。
      Q: 锡膏保质期一般多长？
      A: 未开封冷藏条件下一般为6个月至1年，具体看厂家说明。

  - step_no: 2
    step_title: "回温"
    step_content: |
      在使用前，要提前2小时从冰箱中将锡膏取出，待其达到室温后，才能打开锡膏容器的盖子，以免锡膏在解冻过程中凝结产生水汽。如有条件使用锡膏搅拌机，锡膏回到室温只需要15分钟。
    note: |
      1. 必须提前回温，不能直接从冰箱取出使用
      2. 回温过程中不要打开容器盖子
      3. 使用搅拌机可缩短回温时间至15分钟
      4. 回温后锡膏温度应与室温一致
    faq: |
      Q: 为什么要回温？
      A: 防止锡膏接触室温空气时凝结水汽，影响焊接质量。
      Q: 回温时间不够会有什么问题？
      A: 锡膏内部温度不均，印刷时可能出现拉丝、桥连等问题。

  - step_no: 3
    step_title: "搅拌"
    step_content: |
      观察锡膏，如果表面变硬或有助焊剂析出，则必须进行处理，否则不能使用；如果锡膏的表面完好，则要用不锈钢棒搅拌均匀后使用。如果锡膏的黏度太大而不能顺利涂刷，应适当加入专用的稀释剂，稀释并充分搅拌均匀后使用。
    note: |
      1. 使用前必须充分搅拌均匀
      2. 表面变硬或有助焊剂析出的锡膏需处理
      3. 黏度太大时可加入专用稀释剂
      4. 搅拌时使用不锈钢棒，避免污染
    faq: |
      Q: 锡膏表面有一层油是怎么回事？
      A: 这是正常现象，是助焊剂析出，搅拌均匀后可正常使用。
      Q: 稀释剂加多少合适？
      A: 一般不超过锡膏总量的3%，具体按厂家说明。

  - step_no: 4
    step_title: "使用"
    step_content: |
      使用时取出锡膏后，应及时盖好盖子，避免助焊剂挥发。涂覆锡膏和贴装元器件时，操作者应该戴手套，避免污染电路板。涂覆锡膏的关键是要保证锡膏能准确地涂到焊盘上，如果涂的不准确，必须擦掉再重新涂覆。擦洗免清洗锡膏不得使用酒精。
    note: |
      1. 取用完后及时盖好盖子
      2. 操作时必须戴手套
      3. 涂覆位置要准确，不准用酒精擦拭
      4. 避免锡膏长时间暴露在空气中
    faq: |
      Q: 为什么不能用酒精擦锡膏？
      A: 酒精会破坏免清洗锡膏的化学成分，影响焊接质量。
      Q: 锡膏用不完怎么办？
      A: 密封好放回冰箱冷藏，尽快用完。

  - step_no: 5
    step_title: "时效与回收"
    step_content: |
      印好锡膏的电路板要及时贴装元器件，尽可能在4小时内完成再流焊。免清洗锡膏原则上不允许回收使用，如果涂覆的间隔时间超过1小时，必须把锡膏从模板上取下来并存放到当天使用的单独容器里，不要将回收的锡膏放回原容器。完成再流焊的电路板，需要清洗的应该在当天完成清洗，防止锡膏的残留物对电路板产生腐蚀。
    note: |
      1. 印好锡膏的PCB需在4小时内完成再流焊
      2. 免清洗锡膏原则上不回收
      3. 回收的锡膏需单独存放，不回原容器
      4. 需清洗的PCB当天完成清洗
    faq: |
      Q: 为什么要在4小时内完成再流焊？
      A: 锡膏暴露在空气中会氧化，影响焊接质量。
      Q: 回收的锡膏为什么不能放回原容器？
      A: 回收的锡膏已被污染，放回原容器会影响整罐锡膏质量。