tutorial:
  process_name: 导线绕焊工艺
  total_steps: 4
  estimated_time: 约 1-2 分钟/接头
steps:
  - step_no: 1
    step_title: 去掉绝缘皮
    step_content: |
      去掉导线端头一定长度的绝缘皮。
    note: |
      1. 绝缘皮去掉长度要合适
      2. 注意不要损伤导线芯线
      3. 多股导线需绞紧
    faq: |
      Q: 去掉绝缘皮时损伤了芯线怎么办？
      A: 如果损伤严重，应剪去受伤部分，重新剥去绝缘皮。

  - step_no: 2
    step_title: 镀锡并套热缩套管
    step_content: |
      导线端头镀锡，并给导线套上合适的热缩套管。
    note: |
      1. 镀锡要均匀，确保导线表面被焊锡充分覆盖
      2. 热缩套管尺寸要与导线匹配
      3. 热缩套管先套在导线上，不要推到焊接位置
    faq: |
      Q: 热缩套管什么时候套？
      A: 在焊接之前就要套在导线上，焊接完成后再推到接头处加热收缩。

  - step_no: 3
    step_title: 绞合并焊接
    step_content: |
      两条导线绞合，焊接。对于导线和接线端子的绕焊，把经过镀锡的导线端头在接线端子上绕一圈，然后用钳子拉紧缠牢后进行焊接。在缠绕时，导线一定要紧贴端子表面，绝缘层不要接触端子。一般取 L=1~2 mm 为宜。
    note: |
      1. 导线绞合要紧密
      2. 绕焊端子时绕一圈后用钳子拉紧
      3. 导线紧贴端子表面，绝缘层不接触端子
      4. 绕焊长度 L 取 1~2 mm 为宜
    faq: |
      Q: 绕焊端子时绕几圈合适？
      A: 一般绕一圈即可，然后用钳子拉紧缠牢。
      Q: 绕焊长度 L 是指什么？
      A: 指导线裸露部分的长度，一般取 1~2 mm 为宜。

  - step_no: 4
    step_title: 加热热缩套管
    step_content: |
      趁热把套管推到接头焊点上，用热风或用电烙铁烘烤热缩套管，套管冷却后应该固定并紧裹在接头上。这样能够保证连接的可靠性。
    note: |
      1. 趁热推套管到焊点位置
      2. 用热风或电烙铁均匀烘烤
      3. 确保套管紧裹在接头上
      4. 冷却后检查固定是否牢固
    faq: |
      Q: 热缩套管收缩不紧怎么办？
      A: 可以再次加热烘烤，确保套管充分收缩并紧裹接头。
      Q: 没有热风枪怎么办？
      A: 可以用电烙铁侧面轻轻烘烤热缩套管，注意温度不要过高。