- standard_code: GB/T 47229.3-2026
  standard_name: 法律法规电子文件 第3部分：交换接口
  section: ''
  summary: 该规范在电子信息制造业中重点用于电子信息制造过程的设计、生产、检验、可靠性验证和质量闭环。当前未获取到官网 PDF/正文目录中的真实章节号和章节名称，section 按录入规则留空；应用时应从正式标准文本提炼工艺参数、试验条件、验收判据、记录要求和不合格处置要求，并转换为作业指导书、检验规范、设备点检项目或质量审核清单。对涉及客户等级、产品等级、可靠性等级或法规合规的条款，应在项目导入、首件确认、量产巡检和出货评审中保持一致引用。
    来源：https://openstd.samr.gov.cn/bzgk/std/newGbInfo?hcno=B4AB2A39F71E33D5E156C6B981B5F3D3
  tags: 电子制造,行业规范,GB标准,国家标准
  related_process: 电子制造
