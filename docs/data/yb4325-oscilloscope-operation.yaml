tutorial:
  process_name: "YB4325型示波器基本操作流程"
  total_steps: 8
  estimated_time: "约5-10分钟"

steps:
  - step_no: 1
    step_title: "打开电源开关"
    step_content: |
      将电源线接到交流插座，打开电源开关，电源指示灯变亮，约20s后，示波器屏幕上会显示光迹。如60s后仍未出现光迹，应按表9-1检查开关和控制按钮的设定位置。
    note: |
      1. 确保电源线连接牢固
      2. 等待约20秒让示波器预热
      3. 60秒后仍无光迹需检查设定
      4. 参考表9-1检查各旋钮位置
    faq: |
      Q: 打开电源后无光迹怎么办？
      A: 检查辉度旋钮是否调太暗，检查各开关位置是否正确。
      Q: 指示灯不亮怎么办？
      A: 检查电源线连接，检查电源插座是否有电。

  - step_no: 2
    step_title: "调节辉度和聚焦"
    step_content: |
      调节辉度（INTEN）和聚焦（FOCUS）旋钮，将光迹亮度调到合适且最清晰。
    note: |
      1. 辉度不要调太亮，避免灼伤荧光屏
      2. 聚焦要调到光迹最细最清晰
      3. 两者配合调节效果更好
    faq: |
      Q: 光迹太亮或太暗怎么办？
      A: 调节INTEN旋钮，顺时针变亮，逆时针变暗。
      Q: 光迹模糊怎么办？
      A: 调节FOCUS旋钮，直到光迹最清晰。

  - step_no: 3
    step_title: "调整扫线与水平中心线平行"
    step_content: |
      调节CH1位移旋钮及光迹旋转旋钮，将扫线调到与水平中心刻度线平行。
    note: |
      1. 扫线要与水平刻度线平行
      2. 必要时调节光迹旋转旋钮
      3. 确保基线在屏幕中心区域
    faq: |
      Q: 扫线倾斜怎么办？
      A: 使用光迹旋转旋钮进行校正。
      Q: 扫线不在屏幕中央怎么办？
      A: 调节垂直位移旋钮。

  - step_no: 4
    step_title: "连接探极和校准信号"
    step_content: |
      将探极连接到CH1输入端，将2 Vp-p校准信号加到探极上。
    note: |
      1. 探极要牢固连接到CH1输入端
      2. 确保校准信号正确连接
      3. 探极开关通常置于×10位置
    faq: |
      Q: 校准信号是什么？
      A: 示波器自带的标准方波信号，用于校准和测试。
      Q: 探极上的×1和×10有什么区别？
      A: ×1直接传输信号，×10衰减10倍，适合测量高电压。

  - step_no: 5
    step_title: "设置AC-DC-GND开关"
    step_content: |
      将AC-DC-GND开关拨到AC，屏幕上将会出现如图9-4所示的波形。
    note: |
      1. AC挡适合观察交流信号
      2. DC挡适合观察包含直流分量的信号
      3. GND挡用于接地，确定零电平参考
    faq: |
      Q: AC、DC、GND三档有什么区别？
      A: AC耦合隔直流，DC耦合直通交直流，GND接地。
      Q: 为什么屏幕没显示波形？
      A: 检查耦合方式是否正确，检查输入信号是否正常。

  - step_no: 6
    step_title: "调节聚焦使波形清晰"
    step_content: |
      调节聚焦（FOCUS）旋钮，使波形达到最清晰。
    note: |
      1. 聚焦要调到波形最清晰
      2. 可以配合辉度调节
      3. 长时间观察时聚焦要适中
    faq: |
      Q: 波形模糊怎么办？
      A: 调节FOCUS旋钮，或检查信号频率是否超出示波器带宽。

  - step_no: 7
    step_title: "调节VOLTS/DIV和TIME/DIV"
    step_content: |
      为便于信号的观察，将VOLTS/DIV开关和TIME/DIV开关调到适当的位置，使信号波形幅度适中，周期适中。
    note: |
      1. VOLTS/DIV调节垂直灵敏度
      2. TIME/DIV调节水平扫描速度
      3. 使波形在屏幕上显示完整且易于观察
    faq: |
      Q: VOLTS/DIV怎么选？
      A: 根据信号幅度选择，使波形占屏幕高度的1/2-2/3。
      Q: TIME/DIV怎么选？
      A: 根据信号周期选择，使波形显示2-3个周期。

  - step_no: 8
    step_title: "调节位移使波形对准刻度"
    step_content: |
      调节垂直位移和水平位移旋钮到适中位置，使显示的波形对准刻度线且电压幅度（Vp-p）和周期（T）能方便读出。
    note: |
      1. 垂直位移将波形移到合适的垂直位置
      2. 水平位移将波形移到合适的水平位置
      3. 对准刻度线便于读数
    faq: |
      Q: 怎么读数？
      A: 根据VOLTS/DIV和TIME/DIV档位，计算波形的幅度和周期。
      Q: 波形超出屏幕怎么办？
      A: 增大VOLTS/DIV（幅度太大）或增大TIME/DIV（频率太高）。