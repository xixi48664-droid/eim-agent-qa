tutorial:
  process_name: 整机调试
  total_steps: 9
  estimated_time: 约 1-4 小时/台
steps:
  - step_no: 1
    step_title: 部件调试和装配检验
    step_content: |
      在整机装配性连接之前，各部件必须分别调试；在整机通电调试之前，必须先通过装配检验。
    note: |
      1. 各部件分别调试
      2. 整机通电前先通过装配检验
    faq: |
      Q: 为什么要先进行部件调试？
      A: 确保各部件功能正常后再组装，避免整体调试时问题定位困难。

  - step_no: 2
    step_title: 检查供电系统并通电
    step_content: |
      检查确认产品的供电系统（如电源电路）的开关处于"关"的位置，用万用表等仪表判断并确认电源输入端无短路或输入阻抗正常，然后顺序接上地线和电源线，插好电源插头，打开电源开关通电。接通电源后，此时要观察电源指示灯是否点亮，注意有无异样气味，产品中是否有冒烟的现象；对于低压直流供电的产品，可以用手触摸一下，判断有无温度超常。如有这些现象，说明产品内部电路存在短路，必须立即断开电源检查故障。如果看来正常，可以用仪器仪表（万用表或示波器）检查供电系统的电压和纹波系数。
    note: |
      1. 电源开关先处于"关"的位置
      2. 检查输入端无短路或输入阻抗正常
      3. 顺序接地线和电源线
      4. 观察指示灯、气味、冒烟、温度情况
      5. 异常立即断电检查
      6. 正常则检查电压和纹波系数
    faq: |
      Q: 通电时发现异常怎么办？
      A: 立即断开电源检查故障，确认问题后再重新通电。

  - step_no: 3
    step_title: 按模块依次调试
    step_content: |
      按照电路的功能模块，根据调试的方便，从前往后或者从后往前地依次把它们接通电源，分别测量各电路（或电路各级）的工作点和其他工作状态。注意：应该调试完成一部分以后，再接下一部分进行调试。不要一开始就把电源加到全部电路上。这样，不仅使工作有条理，还能减少因电路接错而损坏元器件，避免扩大事故。
    note: |
      1. 按功能模块依次调试
      2. 可从前往后或从后往前
      3. 调试完一部分再接下一部分
      4. 不要一开始就给全部电路通电
    faq: |
      Q: 为什么要分模块调试？
      A: 使工作有条理，减少因电路接错而损坏元器件，避免扩大事故。

  - step_no: 4
    step_title: 参数调整
    step_content: |
      在对产品进行测试的时候，可能需要对某些元器件的参数做出调整。调整参数的方法一般有"选择法"和"调节可调元件法"。
      - 选择法：通过替换元件来选择合适的电路参数。电路原理图中，在这种元件的参数旁边通常标注有"*"号，表示需要在调整中才能准确地选定。因为反复替换元件很不方便，一般总是先接入可调元件，待调整确定了合适的元件参数值后，再换上与选定参数值相同的固定元件。
      - 调节可调元件法：在电路中已经装有可调整元件，如电位器、微调电容器或微调电感器等。其优点是调节方便，并且电路工作一段时间以后如果状态发生变化，还可以随时调整；但可调元件的可靠性较差，体积也比固定元件大。可调元件的参数调整确定以后，必须用黏合剂或快干漆把调整端固定住。
    note: |
      1. 选择法：先接可调元件，确定参数后换固定元件
      2. 调节可调元件法：调节电位器、微调电容/电感等
      3. 调整确定后用黏合剂或快干漆固定调整端
    faq: |
      Q: 标注"*"号的元件是什么意思？
      A: 表示需要在调整中才能准确选定参数的元件。

  - step_no: 5
    step_title: 连接各级模块测试
    step_content: |
      当各级电路模块调试完成以后，把它们连接起来，测试相互之间的影响，排除影响性能的不利因素。
    note: |
      1. 各级模块都完成后再连接
      2. 测试模块之间的相互影响
      3. 排除影响性能的不利因素
    faq: |
      Q: 模块连接后发现相互影响怎么办？
      A: 检查电路设计、布局和接地等，找出并排除影响性能的不利因素。

  - step_no: 6
    step_title: 高频部件屏蔽
    step_content: |
      如果调试高频部件，要采取屏蔽措施，防止工业干扰或其他电磁场的干扰。
    note: |
      1. 高频部件调试时采取屏蔽措施
      2. 防止工业干扰和电磁场干扰
    faq: |
      Q: 高频部件为什么需要屏蔽？
      A: 防止工业干扰或其他电磁场的干扰，保证调试结果准确。

  - step_no: 7
    step_title: 测试整机消耗电流和功率
    step_content: |
      测试整机的消耗电流和功率。
    note: |
      1. 测量整机消耗电流
      2. 测量整机功率消耗
    faq: |
      Q: 测试消耗电流和功率的目的是什么？
      A: 确认整机功耗符合设计要求，电源系统负载正常。

  - step_no: 8
    step_title: 测试其他性能指标
    step_content: |
      对整机的其他性能指标进行测试，例如运行软件，观察图形、图像、声音的效果。
    note: |
      1. 运行软件测试
      2. 观察图形效果
      3. 观察图像效果
      4. 观察声音效果
      5. 根据产品特性测试其他相关性能
    faq: |
      Q: 还需要测试哪些性能指标？
      A: 根据产品特性而定，如功能、性能、稳定性、可靠性等指标。

  - step_no: 9
    step_title: 老化和环境试验
    step_content: |
      对产品进行老化和环境试验（将在下文中介绍）。
    note: |
      1. 进行老化试验
      2. 进行环境试验
      3. 按相关标准执行
    faq: |
      Q: 老化试验的目的是什么？
      A: 发现早期故障，提高产品可靠性稳定性。