tutorial:
  process_name: "BGA 返修流程"
  total_steps: 6
  estimated_time: "约 15-30 分钟/片（含X-Ray检测）"

steps:
  - step_no: 1
    step_title: "拆焊"
    step_content: |
      使用BGA返修台或热风枪对BGA芯片进行加热拆除。设置合适的温度曲线，一般预热区150-180°C，升温至220-250°C使焊锡熔化。用吸锡线或吸锡笔清除PCB焊盘上的残留焊锡，同时将拆下的BGA芯片放在耐高温托盘上冷却备用。
    note: |
      1. 加热温度需根据焊锡类型（有铅/无铅）调整
      2. 无铅焊锡熔点约217-227°C，回流温度需达235-250°C
      3. 拆除时避免过度加热，损伤PCB或相邻元件
      4. 确保所有引脚同时熔化后再轻轻取下芯片
    faq: |
      Q: 如何判断焊锡已完全熔化？
      A: 观察芯片轻微晃动时焊锡呈液态，或使用红外测温仪监测温度。
      Q: 拆焊时旁边的小元件被加热影响怎么办？
      A: 用耐高温胶带或遮光片保护周围元件，或使用局部预热。

  - step_no: 2
    step_title: "清理焊盘"
    step_content: |
      将拆除后的PCB焊盘表面残留焊锡和脏污彻底清除。使用吸锡线配合烙铁拖动，吸除残余焊锡，形成平整的焊盘表面。用无水酒精和防静电刷清洁焊盘，确保无残留物、平整光滑。
    note: |
      1. 吸锡线选择宽度与焊盘间距相匹配的规格
      2. 清理时避免划伤或破坏焊盘铜箔
      3. 清洁后检查焊盘是否平整，有无翘起
      4. 操作需在防静电环境下进行
    faq: |
      Q: 焊盘上有残留物清除不干净怎么办？
      A: 使用专业PCB清洗剂，配合软毛刷轻轻刷洗，避免使用腐蚀性溶剂。
      Q: 焊盘被不小心弄坏了怎么办？
      A: 如损坏轻微可修复焊盘，严重则需送回PCB厂家处理或更换。

  - step_no: 3
    step_title: "植球"
    step_content: |
      在清理干净的BGA芯片焊盘上重新植球。将焊球（直径0.25-0.76mm，根据封装选择）放置在芯片对应位置，使用植球工装或钢网对准。使用回流炉或热风枪加热，使焊球与焊盘焊接牢固。植球完成后检查是否有遗漏或偏移的焊球。
    note: |
      1. 焊球直径需与芯片封装要求匹配
      2. 植球前确保芯片焊盘和焊球表面干净
      3. 加热温度和时间需严格控制，避免氧化
      4. 植球完成后检查是否所有焊球都正确放置
    faq: |
      Q: 植球用什么设备最合适？
      A: 专业植球台或回流炉效果最好，热风枪操作难度较高。
      Q: 焊球大小如何选择？
      A: 根据芯片封装规格书，常见有0.25mm、0.35mm、0.45mm、0.5mm、0.76mm等规格。

  - step_no: 4
    step_title: "贴装"
    step_content: |
      将植好球的BGA芯片精确对准PCB焊盘位置。使用贴装工具（如镊子或真空吸取笔）轻轻放置芯片，确保所有焊球对准对应焊盘。可使用返修台或贴装机的视觉系统辅助对准，放置后轻轻按压确认位置正确。
    note: |
      1. 对准精度要求高，偏移需小于0.1mm
      2. 放置时避免芯片与焊盘产生相对位移
      3. 确认芯片方向（一般有1脚标识）与PCB丝印对应
      4. 贴装后一般不需要额外固定，等待回流焊接
    faq: |
      Q: 如何确保贴装精度？
      A: 使用返修台的真空吸附和光学对准系统，或在显微镜下观察确认。
      Q: 贴装后芯片位置有轻微偏移怎么办？
      A: 在焊锡熔化前可用镊子轻轻调整，一旦回流开始切勿移动。

  - step_no: 5
    step_title: "回流"
    step_content: |
      将贴装好的PCB放入回流焊炉或使用返修台进行回流焊接。根据焊锡类型设置温度曲线：预热区（150-180°C，60-90秒）→恒温区（180-200°C，60-120秒）→回流区（有铅183°C以上，无铅217°C以上，60-90秒）→冷却区。焊锡熔化后形成可靠焊点。
    note: |
      1. 必须使用有铅或无铅对应的温度曲线
      2. 无铅焊锡峰值温度一般235-250°C
      3. 回流次数尽量减少，避免芯片和PCB老化
      4. 冷却速率适中，避免产生冷焊
    faq: |
      Q: 回流后出现气泡或空洞怎么办？
      A: 预热不足或焊锡氧化可能导致，需优化温度曲线和存储条件。
      Q: 芯片偏移怎么办？
      A: 轻微偏移可用烙铁手工修正，偏移严重需重新返工。

  - step_no: 6
    step_title: "X-Ray检测"
    step_content: |
      回流完成后使用X-Ray检测设备对BGA焊点进行质量检测。检测内容主要包括：焊球完整性、桥连（短路）、少锡（虚焊）、偏移、对准情况等。X-Ray可以检测到肉眼不可见的焊点内部缺陷，确保焊接质量。
    note: |
      1. X-Ray可检测焊点内部缺陷，肉眼无法观察
      2. 重点关注：桥连、空洞、虚焊、偏移
      3. IPC-A-610标准对BGA焊点有明确规定
      4. 检测合格后方可进行后续装配和测试
    faq: |
      Q: X-Ray检测能发现哪些问题？
      A: 桥连短路、少锡虚焊、焊球偏移、枕头效应、气泡空洞等内部缺陷。
      Q: 检测发现质量问题怎么办？
      A: 根据缺陷类型决定返修或报废，必要时重新进行拆焊→植球→贴装→回流流程。