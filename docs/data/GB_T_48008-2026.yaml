- standard_code: GB/T 48008-2026
  standard_name: 电磁兼容 居住、商业和轻工业环境中设备的抗扰度风险评估通用要求
  section: ''
  summary: 该规范在电子信息制造业中重点用于整机和模块的 EMC 设计验证、抗扰度测试和整改闭环。当前未获取到官网 PDF/正文目录中的真实章节号和章节名称，section 按录入规则留空；应用时应从正式标准文本提炼工艺参数、试验条件、验收判据、记录要求和不合格处置要求，并转换为作业指导书、检验规范、设备点检项目或质量审核清单。对涉及客户等级、产品等级、可靠性等级或法规合规的条款，应在项目导入、首件确认、量产巡检和出货评审中保持一致引用。
    来源：https://openstd.samr.gov.cn/bzgk/std/newGbInfo?hcno=2E878D00B720E45418DA5613C8F42AC9
  tags: EMC,测试,可靠性,GB标准,国家标准
  related_process: EMC测试,整机测试
