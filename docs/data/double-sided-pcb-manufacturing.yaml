tutorial:
  process_name: "双面印制板制作流程"
  total_steps: 12
  estimated_time: "约3-5天/批"

steps:
  - step_no: 1
    step_title: "选材"
    step_content: |
      选材是指根据不同的需要选择不同材料、不同厚度的覆铜板。
    note: |
      1. 根据电路要求选择合适的覆铜板材质
      2. 注意覆铜板厚度要符合设计要求
      3. 检查覆铜板表面质量，无划痕、氧化等缺陷
    faq: |
      Q: 常用的覆铜板材料有哪些？
      A: 常用的有FR-4（环氧树脂玻璃布）、FR-1（纸基板）、CEM-1（复合基板）等。
      Q: 如何选择覆铜板厚度？
      A: 根据PCB尺寸、元器件重量、电流大小等因素选择，一般1.6mm最常用。

  - step_no: 2
    step_title: "下料"
    step_content: |
      下料是按照所需要的印制电路板的大小，将覆铜板切割成所需要的大小。
    note: |
      1. 按照设计尺寸精确切割
      2. 注意边缘整齐，无毛刺
      3. 保留工艺边，便于后续工序定位
    faq: |
      Q: 下料时如何保证尺寸精度？
      A: 使用裁板机或铣床切割，提前测量定位。
      Q: 工艺边留多少合适？
      A: 一般留5-10mm，根据后续工序设备要求确定。

  - step_no: 3
    step_title: "钻孔"
    step_content: |
      通常是根据PCB印制电路板的要求，用相应的小型数控机床来"钻孔"。钻孔前先对覆铜板进行定位，然后用数控机床根据事先设计好的位置对覆铜板进行打孔。
    note: |
      1. 使用数控钻孔机，精度高
      2. 钻孔前要固定好覆铜板，防止移位
      3. 钻头要锋利，定期更换
      4. 检查孔径和孔位精度
    faq: |
      Q: 钻孔时孔壁粗糙怎么办？
      A: 检查钻头是否锋利，降低钻速，或更换质量更好的钻头。
      Q: 孔位偏移怎么处理？
      A: 偏移较小可继续后续工序，偏移过大则报废重钻。

  - step_no: 4
    step_title: "孔壁镀铜（孔金属化）"
    step_content: |
      钻孔完后，要对孔壁进行镀铜，也称为"孔金属化"。孔金属化是连接双面板两面导电图形的可靠方法，该方法将铜沉积在贯通两面导线或焊盘的孔壁上，使原来非金属的孔壁金属化。金属化的孔称为金属化孔。
    note: |
      1. 先化学沉铜，形成薄铜层
      2. 擦去表面沉铜（保留孔内）
      3. 再电镀铜加厚，达到要求厚度
      4. 确保孔壁铜层连续、无空洞
    faq: |
      Q: 孔金属化的目的是什么？
      A: 实现双面板两面电路的电气连接，使通孔能导电。
      Q: 如何检查孔金属化质量？
      A: 可用金相显微镜观察孔壁截面，或做通断测试。

  - step_no: 5
    step_title: "贴感光膜"
    step_content: |
      化学沉铜后，要把照相底片或光绘片上的图形转印到覆铜板上，为此，应先在覆铜板上贴一层感光胶膜，即"贴膜"。目前的感光胶基本都是液体，俗称"湿膜"，上感光胶的方法有离心式甩胶、手工涂覆、滚涂、浸蘸、喷涂等。覆铜板在贴了液态感光胶后先要在一定温度下烘干，才可以进行图形转印。
    note: |
      1. 感光胶厚度要均匀
      2. 烘干温度和时间要适当
      3. 避免灰尘和杂质污染胶面
      4. 贴膜后尽快进行下一步工序
    faq: |
      Q: 湿膜和干膜有什么区别？
      A: 湿膜是液态，成本低，适合小批量；干膜是薄膜状，使用方便，精度高。
      Q: 胶层厚度不均会有什么影响？
      A: 可能导致曝光显影不均匀，线条粗细不一，甚至出现短路或开路。

  - step_no: 6
    step_title: "底图胶片的制取"
    step_content: |
      在印制板的生产过程中，无论采用什么方法都需要使用符合质量要求的1:1的底图胶片（也叫原版底片）。获得底图胶片通常有两种基本途径：一种是先绘制黑白底图，再经过照相制版得到；另一种是利用计算机辅助设计系统和光学绘图机直接绘制出来。
    note: |
      1. 底图胶片比例为1:1
      2. 图形线条清晰、边缘整齐
      3. 黑度要够，不透光
      4. 胶片无划痕、无脏污
    faq: |
      Q: 黑白底图用什么绘制？
      A: 可以用专业的CAD软件绘制，然后打印或光绘到胶片上。
      Q: 底图胶片有什么保存要求？
      A: 应保存在阴凉干燥处，避免折叠、划伤，防止老化。

  - step_no: 7
    step_title: "图形转移"
    step_content: |
      它是把胶片上的印制电路图形转移到覆铜板上，称为图形转移。具体方法有丝网漏印、光化学法等。
    note: |
      1. 对位要精确，误差越小越好
      2. 曝光能量和时间要适当
      3. 显影液浓度和温度要控制好
      4. 显影后检查图形质量
    faq: |
      Q: 对位不准怎么处理？
      A: 轻微偏差可接受，偏差过大需要重新贴膜、曝光、显影。
      Q: 显影不净怎么办？
      A: 检查显影液浓度、温度，或适当延长显影时间。

  - step_no: 8
    step_title: "去膜蚀刻"
    step_content: |
      图形转移后，覆铜板上需留下的铜箔表面已被抗蚀层保护起来，未被保护的部分则需要通过化学蚀刻将其除去，以便得到印有电路图形的印制电路板，这就需要"去膜蚀刻"。常用的蚀刻溶液为三氯化铁（FeCl₃），它蚀刻速度快，质量好，溶铜量大，溶液稳定，价格低廉。
    note: |
      1. 先去膜（去除抗蚀层）
      2. 然后蚀刻，去除不需要的铜箔
      3. 蚀刻时间要掌握好，避免过蚀
      4. 蚀刻后充分清洗、干燥
    faq: |
      Q: 蚀刻不足或过蚀怎么办？
      A: 蚀刻不足可再蚀刻一段时间；过蚀导致线条变细，严重的只能报废。
      Q: 三氯化铁蚀刻液可以重复使用吗？
      A: 可以，但随着铜离子增加，蚀刻速度会变慢，需要定期调整或更换。

  - step_no: 9
    step_title: "表面涂覆"
    step_content: |
      为提高电路板的导电、可焊、耐磨、装饰等性能，提高其电气连接的可靠性，延长印制电路板的使用寿命，一般可以在印制电路板图形铜箔上涂覆一层金属。常用的金属涂覆材料有金、银和铅锡合金等。涂覆方法可用电镀或化学镀两种：电镀法可使镀层致密、牢固、厚度均匀可控，但设备复杂、成本高；化学镀虽然设备简单、操作方便、成本低，但镀层厚度有限且牢固性差。
    note: |
      1. 根据需要选择合适的涂覆材料
      2. 镀层厚度要符合要求
      3. 电镀前表面要清洁
      4. 电镀后充分清洗、干燥
    faq: |
      Q: 镀金、镀银、镀铅锡合金各有什么优缺点？
      A: 镀金耐磨性好但成本高；镀银导电性好但易氧化；镀铅锡合金可焊性好且成本低，最常用。
      Q: 镀层厚度一般要求多少？
      A: 根据用途不同，一般5-20μm，可焊性镀层要更厚一些。

  - step_no: 10
    step_title: "热熔和热风整平"
    step_content: |
      镀有铅锡合金的印制电路板一般要经过热熔和热风整平工艺。热熔过程是把镀覆有铅锡合金的印制电路板，加热到铅锡合金的熔点温度以上，使铅锡和基体金属铜形成化合物，同时铅锡镀层变得致密、光亮、无针孔，从而提高镀层的抗腐蚀性和可焊性。热风整平技术是已涂覆阻焊剂的印制电路板浸过热风整平助熔剂后，再浸入熔融的焊料槽中，然后从两个风刀间通过，风刀里的热压缩空气把印制电路板板面和孔内的多余焊料吹掉，得到一个光亮、均匀、平滑的焊料涂覆层。
    note: |
      1. 热熔温度要控制在铅锡合金熔点以上
      2. 热风整平前先涂助熔剂
      3. 风刀压力、温度、速度要调整好
      4. 整平后检查焊料层质量
    faq: |
      Q: 热风整平的优点是什么？
      A: 焊料成分恒定；厚度可控；可焊性优良；只有焊盘有焊料，导线上没有，避免短路。
      Q: 热熔后镀层不光亮怎么办？
      A: 检查温度是否足够，时间是否充分，或镀层本身质量有问题。

  - step_no: 11
    step_title: "外表面处理"
    step_content: |
      为了提高电路板的质量和方便焊接工作，在印制电路板需要焊接的地方涂上助焊剂，不需要焊接的地方印上阻焊层，在需要标注的地方印上图形和字符，这就是印制电路板的另一个工艺——外表面处理。具体包括：1）助焊剂：在电路图形的表面上喷涂助焊剂，既可以保护镀层不氧化，又能提高可焊性；2）阻焊剂：在印制板上涂覆的阻焊层，作用是限定焊接区域，防止焊接时搭焊、桥接造成的短路，改善焊接的准确性，减少虚焊，防护机械损伤，减少潮湿气体和有害气体对板面的侵蚀；3）字符：一般是在印制板上标注出元器件的代号、型号和规格，同时也印出元器件的符号，方便焊接、装配和维修。
    note: |
      1. 助焊剂只涂在需要焊接的焊盘上
      2. 阻焊层要覆盖除焊盘外的全部区域
      3. 字符印刷要清晰、位置准确
      4. 各层之间对位要准确
    faq: |
      Q: 阻焊层为什么是绿色的？
      A: 绿色最常用，也有其他颜色，主要是视觉效果好，方便检查，同时对眼睛刺激小。
      Q: 字符印刷模糊怎么办？
      A: 检查丝印网版质量、油墨质量、印刷压力等，必要时重新印刷。

  - step_no: 12
    step_title: "印制电路板的检验"
    step_content: |
      对于制作完成的印制电路板除了要进行电路性能检验外，还要进行外形表面的检查。电路性能检验有导通性检验、绝缘性检验等。外形表面检查的内容有：1）印制电路板板面应平整，无严重翘曲，边缘应整齐，没有明显碎裂、分层及毛刺现象，表面不应有未腐蚀的残渣，电路面应具有可焊的保护层；2）印制电路板的导线表面应光洁，边缘应光滑，导线不应断裂，相邻导线不应短路；3）印制电路板金属孔壁镀层无裂痕、黑斑现象，表面无严重的大布纹；4）印制电路板焊盘与加工孔中心应重合，外形尺寸、导线密度、导线宽度、孔径位置及尺寸应符合设计要求。
    note: |
      1. 先外观检查，再性能测试
      2. 按设计图纸逐项检查
      3. 不合格品要标识、隔离
      4. 做好检验记录
    faq: |
      Q: 如何检查孔壁镀层质量？
      A: 可做金相切片观察，或做信赖性测试如热冲击试验后检查。
      Q: 外观检查发现小缺陷能修补吗？
      A: 轻微缺陷可修补，如小断路可补线，小短路可刮除，但要符合质量标准。