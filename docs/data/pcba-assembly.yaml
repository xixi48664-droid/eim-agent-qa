tutorial:
  process_name: PCBA组装流程
  total_steps: 3
  estimated_time: 约 2-4 小时/板
  note: |
    这是顶面混装、底面SMD布局设计，根据插装元器件的焊接方法，可以细分为三类布局，即波峰焊接、托盘选择性波峰焊接和移动喷嘴选择性波峰焊接或手工焊接。由于焊接工艺不同，设计要求略有不同。
steps:
  - step_no: 1
    step_title: 底面采用波峰焊接的布局设计
    step_content: |
      底面采用波峰焊接的布局设计，这类布局适合复杂表面组装器件（不适合波峰焊接的SMD）可以在一面布局下的情况。
      底面一般只能用波峰焊接的封装，如 0603 ~ 1206 范围内的片式元器件、引线间距大于等于1mm的SOP等。
      波峰焊接面上布局的SMD必须用胶固定。
      
      采用的装配工艺流程如下：
      （1）顶面：印刷焊膏→贴片→再流焊接
      （2）底面：点胶→贴片→固化
      （3）顶面：插件
      （4）底面：波峰焊接
      
      之所以先焊接顶面，一方面，因为裸PCB在焊接前比较平整；另一方面，因为底面胶的固化温度比较低（≤150℃），不会对顶面上已经焊接好的元器件构成不良影响。
    note: |
      1. 适合复杂SMD在一面布局的情况
      2. 底面一般只能用波峰焊接的封装（0603~1206等）
      3. 波峰焊接面上的SMD必须用胶固定
      4. 先焊接顶面，裸PCB比较平整
      5. 底面胶固化温度低（≤150℃），不影响顶面元器件
    faq: |
      Q: 为什么先焊接顶面？
      A: 一方面裸PCB在焊接前比较平整；另一方面底面胶固化温度较低（≤150℃），不会影响顶面已焊接好的元器件。
      Q: 底面可用什么封装？
      A: 底面一般只能用波峰焊接的封装，如0603~1206范围内的片式元器件、引线间距大于等于1mm的SOP等。

  - step_no: 2
    step_title: 底面采用掩模选择性波峰焊接的布局设计
    step_content: |
      底面采用掩模选择性波峰焊接的布局设计，这类布局适合SMD数量多、一面布局不下，又有不少插装元器件的情况。
      底面布局要求比较多，一是SMD元器件不能太高；二是波峰焊接元器件与掩模保护的SMD之间的间隔要满足掩模制作及热的设计要求。
      
      掩模选择性波峰焊接的布局设计，其装配工艺流程如下：
      （1）底面：印刷焊膏→贴片→再流焊接
      （2）顶面：印刷焊膏→贴片→再流焊接
      （3）顶面：插件
      （4）底面：加掩模板，波峰焊接
    note: |
      1. 适合SMD数量多、一面布局不下的情况
      2. 适合有不少插装元器件的情况
      3. 底面SMD元器件不能太高
      4. 波峰焊接元器件与掩模保护的SMD间隔要满足要求
      5. 最后底面加掩模板进行波峰焊接
    faq: |
      Q: 掩模选择性波峰焊适合什么情况？
      A: 适合SMD数量多、一面布局不下，又有不少插装元器件的情况。
      Q: 对底面布局有什么要求？
      A: 一是SMD元器件不能太高；二是波峰焊接元器件与掩模保护的SMD之间的间隔要满足掩模制作及热的设计要求。

  - step_no: 3
    step_title: 底面采用移动喷嘴选择性波峰焊接的布局设计
    step_content: |
      底面采用移动喷嘴选择性波峰焊接的布局设计，这类布局适合SMD数量多、一面布局不下，只有少数插装元器件的情况。
      底面布局与双面SMD基本一样，只要插装引脚与周围元器件的间隔满足喷嘴焊接要求即可。
      
      底面采用移动喷嘴选择性波峰焊接的布局设计，其装配工艺流程如下：
      （1）底面：印刷焊膏→贴片→再流焊接
      （2）顶面：印刷焊膏→贴片→再流焊接
      （3）底面：移动喷嘴选择性波峰焊接
    note: |
      1. 适合SMD数量多、一面布局不下的情况
      2. 适合只有少数插装元器件的情况
      3. 底面布局与双面SMD基本一样
      4. 插装引脚与周围元器件间隔要满足喷嘴焊接要求
      5. 最后底面采用移动喷嘴选择性波峰焊接
    faq: |
      Q: 移动喷嘴选择性波峰焊适合什么情况？
      A: 适合SMD数量多、一面布局不下，只有少数插装元器件的情况。
      Q: 对底面布局有什么要求？
      A: 底面布局与双面SMD基本一样，只要插装引脚与周围元器件的间隔满足喷嘴焊接要求即可。