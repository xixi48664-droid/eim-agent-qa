tutorial:
  process_name: "胶接工艺流程"
  total_steps: 6
  estimated_time: "视具体工艺而定"

steps:
  - step_no: 1
    step_title: "表面处理"
    step_content: |
      采用机械的方法，即喷砂或钢（铜）丝刷擦或砂纸打磨等。用汽油或酒精擦拭，以除去油脂、水分、杂物。
    note: |
      1. 根据材料选择合适的表面处理方法
      2. 表面处理要彻底，除尽油脂、水分、杂物
      3. 处理后保持表面清洁干燥
      4. 表面处理后尽快涂胶，避免再次污染
    faq: |
      Q: 表面处理不彻底会怎样？
      A: 会影响胶接强度，导致粘接不牢，容易脱落。
      Q: 汽油和酒精都可以用吗？
      A: 可以，根据油脂类型选择合适的溶剂。

  - step_no: 2
    step_title: "胶粘剂的调配"
    step_content: |
      严格按照配方调配胶粘剂。
    note: |
      1. 准确称量各组分，比例要准确
      2. 搅拌要均匀，确保各组分充分混合
      3. 注意调配顺序，按说明操作
      4. 现配现用，避免胶粘剂固化
      5. 注意胶粘剂适用期，在规定时间内用完
    faq: |
      Q: 不按配方调配可以吗？
      A: 不行，比例不对会影响胶粘剂性能，导致胶接强度下降。
      Q: 调配后可以放多久？
      A: 不同胶粘剂适用期不同，按说明操作，一般建议现配现用。

  - step_no: 3
    step_title: "涂胶"
    step_content: |
      涂胶应在胶接件表面处理结束后立即进行，采用刷涂、喷涂、滚涂等，在胶接面上形成一层厚度均匀、无气泡、并布满胶接表面的薄膜，需经过一个短暂的晾干阶段。
    note: |
      1. 表面处理后立即涂胶，不要等待太久
      2. 根据情况选择刷涂、喷涂、滚涂等方法
      3. 胶层厚度要均匀，不要太厚或太薄
      4. 避免气泡产生，气泡会影响胶接强度
      5. 涂满整个胶接表面，不要遗漏
      6. 按要求进行晾干阶段
    faq: |
      Q: 胶层太厚或太薄有什么影响？
      A: 太厚容易产生气泡和收缩应力，太薄可能填充不足，都影响胶接强度。
      Q: 晾干时间一般多久？
      A: 视胶粘剂类型而定，参考材料说明，一般几分钟到几十分钟。

  - step_no: 4
    step_title: "固化"
    step_content: |
      温度、压力和保持时间是固化的三个重要因素。涂胶后的胶接件，必须用夹具夹住；外加压力要分布均匀；凡需加温固化的胶接件，升温不可过快；在固化过程中不允许移动交接件；加热固化后交接件要缓慢降温。
    note: |
      1. 控制好温度、压力、时间三个参数
      2. 必须用夹具固定胶接件
      3. 压力分布要均匀，避免局部受力不均
      4. 加温固化时升温要缓慢
      5. 固化过程中不要移动胶接件
      6. 加热固化后缓慢降温，避免产生应力
    faq: |
      Q: 三个固化因素哪个最重要？
      A: 都重要，需要配合好，不同胶粘剂侧重点可能不同。
      Q: 固化时移动了会怎样？
      A: 可能导致胶接错位，影响粘接质量和位置精度。

  - step_no: 5
    step_title: "清理"
    step_content: |
      固化后多余的胶液可用刀片、锉刀、砂轮等机械方法清理。
    note: |
      1. 等完全固化后再清理
      2. 选择合适的清理工具（刀片、锉刀、砂轮等）
      3. 清理时注意不要损伤胶接件
      4. 清理干净多余的胶液，保持外观整洁
    faq: |
      Q: 固化前可以清理吗？
      A: 可以，固化前清理更容易，但要注意不要触碰胶接面。
      Q: 用溶剂清理可以吗？
      A: 要看胶粘剂类型，有些固化后不溶解，建议用机械方法。

  - step_no: 6
    step_title: "胶缝检查"
    step_content: |
      胶接处应无裂纹、气泡、漏涂、脱皮、脱胶等现象。
    note: |
      1. 检查胶接处是否有裂纹
      2. 检查是否有气泡
      3. 检查是否有漏涂
      4. 检查是否有脱皮、脱胶现象
      5. 有缺陷的胶接件要及时处理，必要时重新胶接
    faq: |
      Q: 发现缺陷怎么办？
      A: 轻微缺陷可以修补，严重缺陷需要清理后重新胶接。
      Q: 除了外观检查，还有其他检查方法吗？
      A: 可以根据需要进行强度测试、密封性测试等。