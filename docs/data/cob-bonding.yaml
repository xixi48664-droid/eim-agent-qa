tutorial:
  process_name: COB邦定工艺
  total_steps: 12
  estimated_time: 约 30-60 分钟/板
steps:
  - step_no: 1
    step_title: 擦板
    step_content: |
      作用：清洁印制板，去除 PCB 及金手指表面的污渍及氧化物。
      方法：用擦板机自动擦拭，先用橡皮擦拭板面，再用防静电刷子刷掉板面的残留物。
    note: |
      1. 操作者在放板上料时，手不能靠邦定机头太近，避免受伤
      2. 确保 PCB 表面清洁，无污渍和氧化物
      3. 擦板后检查板面是否干净
    faq: |
      Q: 擦板不净会有什么影响？
      A: 会影响邦线质量，可能导致虚焊、脱焊等问题。

  - step_no: 2
    step_title: 点胶
    step_content: |
      作用：在印制板面上规定位置（衬底）点胶，准备黏接 IC 裸片。
      方法：根据 IC 裸片的大小，把适量的胶点涂在印制板规定的位置上（用点胶筒，也可用医用小针筒）。胶的品种分为导电银胶、缺氧胶（红胶）和黑胶，视产品需要选择；红胶是最常用的胶。
    note: |
      1. 要佩戴防静电腕带操作
      2. 根据 IC 大小控制胶量
      3. 胶的位置要准确
    faq: |
      Q: 常用的胶有哪些？
      A: 常用的有导电银胶、缺氧胶（红胶）和黑胶，红胶是最常用的。

  - step_no: 3
    step_title: 黏接 IC 裸片（贴片）
    step_content: |
      方法：根据产品型号、随工任务单号、加工数量，确认 IC 裸片的型号和黏接方向进行贴片。
    note: |
      1. 操作者要佩戴防静电腕带
      2. 建议用防静电吸笔拾取裸片，也可用尖端粘上双面胶的竹扦，胶的强度以刚好把 IC 粘起来为宜
      3. 贴片的力度要适当，避免压伤 IC
      4. 吸取 IC 裸片，轻轻放在已点好胶的 PCB 上，尽量一次放正，不能贴歪或贴反。然后用吸笔头轻压裸片，使之黏接牢固
      5. 防静电吸笔的金属头不可外露，以免刮伤裸片，半小时检查一次
      6. 每种 IC 型号批量贴片前，必须确认贴装方向正确
    faq: |
      Q: 贴片时贴歪了怎么办？
      A: 应在胶未固化前小心取下，重新点胶贴片，尽量一次放正。

  - step_no: 4
    step_title: 烤红胶（固化）
    step_content: |
      作用：使胶固化，牢固黏接裸片。
      方法：选择的胶不同，烘烤的时间和温度不同。
      烘烤参数：
      - 缺氧胶（红胶）：90℃，10分钟
      - 银浆：120℃，90分钟
      - 黑胶：120℃，30分钟
    note: |
      1. 严格按照胶的类型设定温度和时间
      2. 确保烤箱温度均匀
      3. 烘烤过程中不要打开烤箱门
    faq: |
      Q: 烘烤温度或时间不对会怎样？
      A: 温度不够或时间不足会导致胶固化不完全，IC 黏接不牢；温度过高或时间过长可能损坏 IC。

  - step_no: 5
    step_title: 邦线
    step_content: |
      作用：连接裸片焊盘和 PCB 上相应的金手指，形成电气连接。
      方法：根据需要，调整邦定机和印制板夹具，编写加工产品的邦定程序，设定的参数要通过检查首件焊点质量确认。
    note: |
      1. 操作者需佩戴防静电腕带
      2. 确认生产机型、产品程序与基板，检查夹具是否松动
      3. 邦线时，排除 IC 来料缺陷或红胶不干现象
      4. 在邦线过程中轻拿轻放物料，对点要准确，操作人员应用显微镜观察邦线过程，若有断线、卷线、偏位、冷热焊、起铝等不良现象，立即停止操作，通知技术管理人员处理
      5. 在正式生产之前，指定专人首检并两小时核查一次操作的正确性，避免邦错、少邦、漏邦等现象
      6. 邦线工序的次品率要控制在 0.6% 以内
    faq: |
      Q: 邦线时出现断线怎么办？
      A: 立即停止操作，检查邦线参数、铝线质量、焊接温度等，通知技术管理人员处理。

  - step_no: 6
    step_title: 前测
    step_content: |
      作用：检验产品邦线后的合格情况。
      方法：根据不同的产品要求，加电检测或使用测试工具进行检测。交接班或更换产品型号时，首先保证电源电压正确，并用万用表校准。为避免电流直接冲击烧坏 IC，检测时，将待测的电路板放入测试架后，才能打开电源开关。测试后，先关闭电源开关再取板，并将已测好的板平放于铝盒里，邦定好的板不能叠放。
    note: |
      1. 需佩戴防静电腕带操作
      2. 已邦好的线不能碰触任何物体
      3. 不可用手接触线弧，避免压弯线弧
      4. 检测前，应判断检验工具是否处于正常状态
      5. 加电前，先检验电压等参数是否正常
      6. 注意设备保养，不要敲打或用硬物刮探针
      7. 邦线工序的次品率要控制在 0.6% 以内
    faq: |
      Q: 测试时要注意什么？
      A: 先放板再开电源，先关电源再取板，避免电流冲击烧坏 IC。

  - step_no: 7
    step_title: 前修
    step_content: |
      作用：修好前测中发现的坏板。
      方法：根据修理报表，先检测问题所在，借助一定的工具修好坏板。
    note: |
      1. 修板前，确保修板工具、工作电压、电流等都处于正常状态
      2. 测出坏品后要在 1 小时内修完，当天出现的坏板，尽量当天修完
      3. 若前修报废率超过 0.6%，尽快分析出原因并及时上报技术管理人员
    faq: |
      Q: 前修报废率过高怎么办？
      A: 应尽快分析原因并上报技术管理人员，找出问题根源并解决。

  - step_no: 8
    step_title: 封胶
    step_content: |
      作用：把邦定在印制板上的 IC 用黑胶覆盖起来，对裸片和焊线起保护作用。
      方法：平稳取板，封胶时轻拿轻放。采用自外而内画圆的方式，以最少量的胶盖住芯片及邦线。不同产品对黑胶的高度及宽度有所不同，严格按要求作业。
      （1）冷胶封胶：选择适当的胶嘴，使黑胶的流出量适中。采用从外向内画圆圈的方式封胶。控制胶的流量，使封胶面积不超出底板上规定的范围；黑胶高度不超过 3 mm。调整真空气压，胶的流出压力在 0.1 ~ 0.4 MPa 范围可调，使黑胶的流量均匀快速，且不会压坏铝线。右手像握毛笔一样握住针管，针尖离铝线保持在 10 ~ 15 mm 距离，踩脚踏开关，以便排出铝线下方的气体，保护黑胶表面没有气泡。
      （2）热胶封胶：严格按操作指示的要求，控制封胶炉的温度与烘烤时间，异常时通知技术管理人员做出调整。将邦好线的 PCB 放在加热台上，先加热的先点胶。PCB 直接加热不得超过 2 min，置于托盘内加热的不超过 5 min，以免影响封胶品质。其他步骤与冷胶作业相同。
    note: |
      1. 不要急速加真空，防止真空将液料吸入导气管
      2. 切勿横放或翻转针筒，避免液料流入机内
      3. 检查有无溢胶、铝线外露等现象，有则及时修补
      4. 黑胶高度不超过 3 mm
      5. 胶的流出压力在 0.1 ~ 0.4 MPa 范围
    faq: |
      Q: 封胶表面有气泡怎么办？
      A: 踩脚踏开关排出铝线下方气体，调整封胶方式，确保黑胶表面无气泡。

  - step_no: 9
    step_title: 烘烤
    step_content: |
      作用：使黑胶固化，达到保护芯片及焊线的效果。
      方法：操作员按工艺要求控制炉温及气压，条件不一样的板（例如纤维板与纸板）不能同炉烘烤。严格按操作指示要求控制烘烤炉的温度与烘烤时间，异常时应做出调整。特别留意基板与 0.8 mil 及 1.0 mil 铝线的烘烤温度和时间。
    note: |
      1. 不同类型的板不能同炉烘烤
      2. 严格控制烘烤温度和时间
      3. 注意铝线的烘烤参数
    faq: |
      Q: 不同材质的板可以一起烘烤吗？
      A: 不可以，例如纤维板与纸板不能同炉烘烤，因为它们的受热特性不同。

  - step_no: 10
    step_title: 后测
    step_content: |
      作用：方法同邦线后的前测工序，检验固化后的产品有无不良现象。后测员按质量管理的操作指示进行全功能测试。首先根据 COB 检验规程描述外观缺陷，选出外观不良（如芯片、铝线或衬底外露，有气孔等）的板，退回封胶组补胶。如发现封胶有气泡，应及时通知封胶组控制。测出的坏板要在印制板上注明编号，封胶过高的也要返回后修工序。
    note: |
      1. 按质量管理操作指示进行全功能测试
      2. 检查外观缺陷，如芯片、铝线或衬底外露、气孔等
      3. 坏板注明编号
    faq: |
      Q: 发现封胶有气泡怎么办？
      A: 及时通知封胶组控制，并将不良板退回封胶组补胶。

  - step_no: 11
    step_title: 后修
    step_content: |
      作用：修补后测工序发现的坏板，方法同前修。
    note: |
      1. 及时处理后测发现的次品，当天的次品尽量在当天修完
      2. 经返工修理后的产品，总体报废率不允许超过 1.6%（正常情况下，报废率不得超过 1%，即封胶前 0.7%，封胶后 0.3%）。否则，尽快分析出原因并及时上报工序负责人
    faq: |
      Q: 总体报废率超过 1.6% 怎么办？
      A: 应尽快分析原因并上报工序负责人。

  - step_no: 12
    step_title: QC 抽检和出货
    step_content: |
      产品抽检，周转流程。邦定机的操作比较复杂，读者所接触的邦定机品牌和类型有所不同，请认真参考设备说明书进行操作，或者接受邦定机生产厂家的技术培训。
    note: |
      1. 按 QC 抽检标准进行抽检
      2. 认真参考设备说明书操作
      3. 接受邦定机厂家技术培训
    faq: |
      Q: 不同品牌的邦定机操作一样吗？
      A: 邦定机操作比较复杂，不同品牌和类型有所不同，应参考设备说明书或接受厂家培训。