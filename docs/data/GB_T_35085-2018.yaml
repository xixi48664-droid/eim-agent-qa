- standard_code: GB/T 35085-2018
  standard_name: 金属材料焊缝破坏性试验 激光和电子束焊接接头的维氏和努氏硬度试验
  section: ''
  summary: 该规范在电子信息制造业中重点用于SMT 贴装、回流焊、波峰焊、手工焊和焊点验收。当前未获取到官网 PDF/正文目录中的真实章节号和章节名称，section 按录入规则留空；应用时应从正式标准文本提炼工艺参数、试验条件、验收判据、记录要求和不合格处置要求，并转换为作业指导书、检验规范、设备点检项目或质量审核清单。对涉及客户等级、产品等级、可靠性等级或法规合规的条款，应在项目导入、首件确认、量产巡检和出货评审中保持一致引用。
    来源：https://openstd.samr.gov.cn/bzgk/std/newGbInfo?hcno=333CDD5B9B68CAB4841AE9422C53814D
  tags: 焊接,SMT,工艺检验,GB标准,国家标准
  related_process: 回流焊,波峰焊,手工焊
