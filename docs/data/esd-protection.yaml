tutorial:
  process_name: "ESD 静电防护流程"
  total_steps: 5
  estimated_time: "约 5-10 分钟/次"

steps:
  - step_no: 1
    step_title: "接地检查"
    step_content: |
      进入ESD防护工作区前，首先检查防静电接地系统是否正常。确认接地线连接牢固，无松动或破损。使用万用表测量接地电阻，确保接地电阻符合要求（一般≤10Ω）。检查接地母线、接地铜带、接地标签等是否完好。
    note: |
      1. 防静电接地是ESD防护的基础，必须可靠
      2. 接地电阻应≤10Ω（ANSI/ESD S20.20标准）
      3. 定期检查接地系统，避免接地不良
      4. 接地线应使用黄绿色接地线，便于识别
    faq: |
      Q: 接地电阻过大会有什么影响？
      A: 静电无法有效泄放，增加静电损伤风险。
      Q: 如何快速判断接地是否正常？
      A: 使用万用表测量接地端与大地之间的电阻，或使用接地检测仪。

  - step_no: 2
    step_title: "腕带测试"
    step_content: |
      佩戴防静电腕带后，使用腕带测试仪检测腕带是否正常工作。将腕带插入测试仪接口，手环佩戴在手腕上，确认测试仪显示PASS（合格）。如显示FAIL（不合格），需检查腕带佩戴是否正确、腕带是否有损坏、弹簧片接触是否良好。
    note: |
      1. 腕带必须紧贴皮肤，确保良好接触
      2. 腕带线不能有破损或断裂
      3. 每天使用前必须测试，合格后方可上岗
      4. 腕带测试仪需定期校准
    faq: |
      Q: 腕带测试失败怎么办？
      A: 检查腕带是否正确佩戴、皮肤接触是否良好、腕带线是否破损，必要时更换腕带。
      Q: 腕带松紧度如何判断？
      A: 腕带应紧贴皮肤但不过紧，以能插入一根手指为宜。

  - step_no: 3
    step_title: "台面清洁"
    step_content: |
      使用防静电清洁布和无水酒精（或ESD专用清洁剂）清洁工作台面。清除台面上的灰尘、杂物、导体碎屑等污染物。检查防静电台垫是否完好、平整，无破损或褶皱。确认台垫接地线连接正常。
    note: |
      1. 防静电台垫需保持清洁，避免污染降低导电性
      2. 台垫破损需及时更换
      3. 清洁时避免使用普通塑料抹布
      4. 确保台垫接地可靠
    faq: |
      Q: 防静电台垫脏污了怎么办？
      A: 使用防静电清洁剂配合防静电布擦拭，避免使用普通清洁剂。
      Q: 台垫有裂纹还能用吗？
      A: 不能，裂纹会影响导电性能，需立即更换。

  - step_no: 4
    step_title: "离子风机"
    step_content: |
      开启离子风机进行工作区域空气中和。离子风机应放置在工作区上游位置，风向朝向工作区域，使离子覆盖整个工作范围。等待离子风机运行稳定后（一般1-2分钟），再进行敏感器件操作。定期使用离子平衡测试仪检测离子风机性能。
    note: |
      1. 离子风机用于中和空气中的静电
      2. 风向应覆盖整个工作区域
      3. 离子风机需定期维护清洁和性能检测
      4. 离子风机不能替代接地，主要用于非接触场合
    faq: |
      Q: 离子风机需要多久检测一次？
      A: 一般每月检测一次离子平衡度和消散时间。
      Q: 离子风机摆放位置有要求吗？
      A: 应放在工作区上游，风向朝向工作区域，距离约30-60cm。

  - step_no: 5
    step_title: "记录"
    step_content: |
      完成上述ESD防护措施后，在ESD防护记录表上填写记录。记录内容包括：日期、操作人员、腕带测试结果（PASS/FAIL）、接地系统检查结果、离子风机状态等。记录需真实、完整，妥善保存以备追溯。
    note: |
      1. 记录必须真实、完整、可追溯
      2. 记录表格需定期整理归档
      3. 异常情况需单独记录并报告
      4. 记录保存期限根据企业规定执行
    faq: |
      Q: 记录有什么用？
      A: 用于追溯管理，证明ESD防护措施已执行，便于质量管理和问题分析。
      Q: 记录发现异常怎么处理？
      A: 立即停止操作，报告异常情况，采取纠正措施，填写异常处理记录。